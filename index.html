function dst(a,b,c,d){const x=c-a,y=d-b;return Math.sqrt(x*x+y*y)}
function cl(v,a,b){return v<a?a:v>b?b:v}
function lr(a,b,t){return a+(b-a)*t}
function rn(a,b){return Math.random()*(b-a)+a}
function ri(a,b){return Math.floor(rn(a,b+1))}
function ag(a,b,c,d){return Math.atan2(d-b,c-a)}
function hx(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return Math.round(255*(l-a*Math.max(Math.min(k-3,9-k,1),-1))).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`}
function xpFor(lv){return Math.floor(C.XPB*Math.pow(C.XPS,lv))}
function pw(w){let t=0;for(const k in w)t+=w[k];let r=Math.random()*t;for(const k in w){r-=w[k];if(r<=0)return k}return Object.keys(w)[0]}
function fs(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"k";return""+n}
function cr(cx,cy,r,rx,ry,rw,rh){const nx=cl(cx,rx,rx+rw),ny=cl(cy,ry,ry+rh),dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<r*r}
function rcr(cx,cy,r,rx,ry,rw,rh){const nx=cl(cx,rx,rx+rw),ny=cl(cy,ry,ry+rh),dx=cx-nx,dy=cy-ny;const d=Math.sqrt(dx*dx+dy*dy);if(d===0)return{x:cx,y:cy-r};const o=r-d;return{x:cx+(dx/d)*o,y:cy+(dy/d)*o}}

function rr(x,ctx,rx,ry,w,h,rd){rd=Math.min(rd,w/2,h/2);if(rd<0)rd=0;ctx.beginPath();ctx.moveTo(rx+rd,ry);ctx.lineTo(rx+w-rd,ry);ctx.quadraticCurveTo(rx+w,ry,rx+w,ry+rd);ctx.lineTo(rx+w,ry+h-rd);ctx.quadraticCurveTo(rx+w,ry+h,rx+w-rd,ry+h);ctx.lineTo(rx+rd,ry+h);ctx.quadraticCurveTo(rx,ry+h,rx,ry+h-rd);ctx.lineTo(rx,ry+rd);ctx.quadraticCurveTo(rx,ry,rx+rd,ry);ctx.closePath()}

function dPoly(ctx,x,y,r,si,rot,c1,c2,ol,lw){
    if(r<0.5)return;
    const g=ctx.createRadialGradient(x-r*0.2,y-r*0.2,r*0.05,x,y,r*1.05);
    g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.beginPath();
    for(let i=0;i<si;i++){const a=(Math.PI*2/si)*i+rot;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
    if(ol){ctx.strokeStyle=ol;ctx.lineWidth=lw||3;ctx.lineJoin="round";ctx.stroke()}
}
function dCircG(ctx,x,y,r,c1,c2,ol,lw){
    if(r<0.5)return;
    const g=ctx.createRadialGradient(x-r*0.25,y-r*0.25,r*0.05,x,y,r);
    g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    if(ol){ctx.strokeStyle=ol;ctx.lineWidth=lw||3;ctx.stroke()}
}
function dShad(ctx,x,y,r,z){
    if(r<1)return;
    const rz=r*z;
    ctx.save();ctx.globalAlpha=0.14;
    ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(x,y+3*z,rz*1.1,rz*0.6,0,0,Math.PI*2);ctx.fill();
    ctx.restore()
}
function dBar(ctx,x,y,w,h,rat,col){
    if(rat>=1)return;rat=cl(rat,0,1);if(w<1)return;
    const rx=x-w/2;
    ctx.fillStyle="rgba(0,0,0,0.35)";rr(0,ctx,rx,y,w,h,h/2);ctx.fill();
    if(rat>0){ctx.fillStyle=col;rr(0,ctx,rx,y,Math.max(1,w*rat),h,h/2);ctx.fill()}
    ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=0.7;rr(0,ctx,rx,y,w,h,h/2);ctx.stroke()
}

const cvs=document.getElementById("c");
const ctx=cvs.getContext("2d");
let W=0,H=0;
function resize(){cvs.width=W=window.innerWidth;cvs.height=H=window.innerHeight}
resize();window.addEventListener("resize",resize);

const keys={};let mx=0,my=0,md=false;
window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false});
cvs.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY});
cvs.addEventListener("mousedown",e=>{if(e.button===0)md=true});
cvs.addEventListener("mouseup",e=>{if(e.button===0)md=false});
cvs.addEventListener("contextmenu",e=>e.preventDefault());

const cam={x:0,y:0,z:1,sx:0,sy:0,si:0,
    shake(i){this.si=Math.max(this.si,i)},
    update(tx,ty,fov){
        this.z=cl(1/fov,0.45,1.5);
        const vw=W/this.z,vh=H/this.z;
        this.x=lr(this.x,tx-vw/2,C.CL);this.y=lr(this.y,ty-vh/2,C.CL);
        this.x=cl(this.x,0,C.MW-vw);this.y=cl(this.y,0,C.MH-vh);
        if(this.si>0.15){this.sx=(Math.random()-0.5)*this.si*2;this.sy=(Math.random()-0.5)*this.si*2;this.si*=C.CSD}
        else{this.sx=0;this.sy=0;this.si=0}
    },
    wx(sx){return sx/this.z+this.x+this.sx},
    wy(sy){return sy/this.z+this.y+this.sy},
    sx2(wx){return(wx-this.x-this.sx)*this.z},
    sy2(wy){return(wy-this.y-this.sy)*this.z},
    vis(wx,wy,m){m=m||80;const vx=this.x+this.sx,vy=this.y+this.sy,vw=W/this.z,vh=H/this.z;return wx>vx-m&&wx<vx+vw+m&&wy>vy-m&&wy<vy+vh+m}
};

const pPool=[];for(let i=0;i<C.PP;i++)pPool.push({al:false,x:0,y:0,vx:0,vy:0,sz:0,li:0,ml:0,cl:"#fff",tp:"c",fr:0.96,
    update(){this.vx*=this.fr;this.vy*=this.fr;this.x+=this.vx;this.y+=this.vy;this.li--;if(this.li<=0)this.al=false},
    draw(){
        if(!cam.vis(this.x,this.y,20))return;
        const a=cl(this.li/this.ml,0,1),s=this.sz*cam.z*(0.3+0.7*a);
        const sx=cam.sx2(this.x),sy=cam.sy2(this.y);
        ctx.save();ctx.globalAlpha=a;
        if(this.tp==="s"){const ln=Math.sqrt(this.vx*this.vx+this.vy*this.vy),st=Math.max(s,ln*cam.z*1.2),an=Math.atan2(this.vy,this.vx);
            ctx.translate(sx,sy);ctx.rotate(an);ctx.fillStyle=this.cl;ctx.beginPath();ctx.ellipse(0,0,st,s*0.4,0,0,Math.PI*2);ctx.fill()
        }else if(this.tp==="g"){const g=ctx.createRadialGradient(sx,sy,0,sx,sy,s*2);g.addColorStop(0,this.cl);g.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,s*2,0,Math.PI*2);ctx.fill()
        }else if(this.tp==="*"){ctx.fillStyle=this.cl;ctx.beginPath();const ro=(1-a)*12;for(let i=0;i<5;i++){const a1=ro+(Math.PI*2/5)*i-Math.PI/2,a2=a1+Math.PI/5;ctx.lineTo(sx+Math.cos(a1)*s,sy+Math.sin(a1)*s);ctx.lineTo(sx+Math.cos(a2)*s*0.45,sy+Math.sin(a2)*s*0.45)}ctx.closePath();ctx.fill()
        }else{ctx.fillStyle=this.cl;ctx.beginPath();ctx.arc(sx,sy,s,0,Math.PI*2);ctx.fill()}
        ctx.restore()
    }
});
function emitP(x,y,cl,n,spd,sz,li,tp){
    tp=tp||"c";for(let i=0;i<n;i++){const p=pPool.find(p=>!p.al);if(!p)break;const a=Math.random()*Math.PI*2,sp=rn(spd*0.4,spd*1.6);
        p.x=x;p.y=y;p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;p.sz=rn(sz*0.6,sz*1.5);p.li=ri(Math.floor(li*0.5),li);p.ml=p.li;p.cl=cl;p.tp=tp;p.al=true;p.fr=tp==="s"?0.93:0.96}
}
function emitDir(x,y,cl,n,spd,sz,li,an,sp2){
    for(let i=0;i<n;i++){const p=pPool.find(p=>!p.al);if(!p)break;const a=an+rn(-sp2,sp2),sp=rn(spd*0.6,spd*1.4);
        p.x=x;p.y=y;p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;p.sz=rn(sz*0.7,sz*1.3);p.li=ri(Math.floor(li*0.6),li);p.ml=p.li;p.cl=cl;p.tp="s";p.al=true;p.fr=0.92}
}
function sparkle(x,y,r,cl){
    const p=pPool.find(p=>!p.al);if(!p)return;const a=Math.random()*Math.PI*2,dd=Math.random()*r;
    p.x=x+Math.cos(a)*dd;p.y=y+Math.sin(a)*dd;p.vx=rn(-0.3,0.3);p.vy=rn(-1.2,-0.3);p.sz=rn(2,4);p.li=ri(12,22);p.ml=p.li;p.cl=cl;p.tp="*";p.al=true;p.fr=0.98
}

class Wall{
    constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h}
    hit(cx,cy,cr){return cr(cx,cy,cr,this.x,this.y,this.w,this.h)}
    res(cx,cy,cr2){return rcr(cx,cy,cr2,this.x,this.y,this.w,this.h)}
    draw(){
        const sx=cam.sx2(this.x),sy=cam.sy2(this.y),sw=this.w*cam.z,sh=this.h*cam.z;
        if(sx>W+10||sx+sw<-10||sy>H+10||sy+sh<-10)return;
        const g=ctx.createLinearGradient(sx,sy,sx,sy+sh);
        g.addColorStop(0,"#b8b3a8");g.addColorStop(1,"#908880");
        ctx.fillStyle=g;rr(0,ctx,sx,sy,sw,sh,4*cam.z);ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(sx+2,sy+2,sw-4,3*cam.z);
        ctx.strokeStyle="#7a756c";ctx.lineWidth=2.5*cam.z;ctx.lineJoin="round";rr(0,ctx,sx,sy,sw,sh,4*cam.z);ctx.stroke()
    }
}

const walls=[];
(function genWalls(){
    const mg=220,mw=C.MW,mh=C.MH,cx2=mw/2,cy2=mh/2,safe=180;let att=0;
    function canP(x,y,w,h){
        if(x<cx2+safe&&x+w>cx2-safe&&y<cy2+safe&&y+h>cy2-safe)return false;
        for(const wl of walls)if(x<wl.x+wl.w+60&&x+w+60>wl.x&&y<wl.y+wl.h+60&&y+h+60>wl.y)return false;return true
    }
    while(walls.length<C.WN&&att<500){
        att++;let w,h;const r2=Math.random();
        if(r2<0.4){w=rn(C.WMN,C.WMX);h=C.WTH}
        else if(r2<0.8){w=C.WTH;h=rn(C.WMN,C.WMX)}
        else if(r2<0.9){w=rn(60,140);h=rn(60,140)}
        else{const ln=rn(C.WMN,C.WMX*0.6);w=ln;h=C.WTH;
            const x1=rn(mg,mw-mg-w),y1=rn(mg,mh-mg-h);
            if(canP(x1,y1,w,h)){walls.push(new Wall(x1,y1,w,h));const x2=x1+w-C.WTH,h2=rn(60,160);if(canP(x2,y1,C.WTH,h2))walls.push(new Wall(x2,y1,C.WTH,h2))}continue}
        const x=rn(mg,mw-mg-w),y=rn(mg,mh-mg-h);
        if(canP(x,y,w,h))walls.push(new Wall(x,y,w,h))
    }
})();
function wallCheck(cx2,cy2,cr2){for(const w of walls)if(cr(cx2,cy2,cr2,w.x,w.y,w.w,w.h))return w;return null}
function wallResolve(cx2,cy2,cr2){let nx=cx2,ny=cy2;for(let p=0;p<3;p++)for(const w of walls)if(cr(nx,ny,cr2,w.x,w.y,w.w,w.h)){const r2=rcr(nx,ny,cr2,w.x,w.y,w.w,w.h);nx=r2.x;ny=r2.y}return{x:nx,y:ny}}

const bullets=[];const bCooldowns={};let mFlash=0,mfx=0,mfy=0;
function fireBullet(x,y,an,dmg,spd,pen,rate,oid,owner,col){
    const cd=bCooldowns[oid]||0;if(cd>0)return false;
    bCooldowns[oid]=rate;
    const or=(owner&&owner.r)||30;
    const bx=x+Math.cos(an)*(or+14),by=y+Math.sin(an)*(or+14);
    const crt=Math.random()<C.CRIT;
    bullets.push({x:bx,y:by,vx:Math.cos(an)*spd,vy:Math.sin(an)*spd,r:C.BR,dmg:crt?dmg*C.CRITM:dmg,pen,li:C.BL,al:true,oid,col:col||"#00b0db",crt,trail:[]});
    if(oid==="player"){mFlash=C.MF;mfx=bx;mfy=by}
    emitDir(bx,by,"#ffdd66",3,4,3,8,an,0.4);return true
}
function updateBullets(){
    for(const k in bCooldowns)if(bCooldowns[k]>0)bCooldowns[k]--;
    if(mFlash>0)mFlash--;
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        b.trail.push({x:b.x,y:b.y});if(b.trail.length>C.BTL)b.trail.shift();
        b.x+=b.vx;b.y+=b.vy;b.li--;
        if(b.li<=0||b.x<0||b.x>C.MW||b.y<0||b.y>C.MH||wallCheck(b.x,b.y,b.r)){b.al=false}
        if(!b.al){bullets.splice(i,1)}
    }
}
function drawBullets(){
    for(const b of bullets){
        if(!cam.vis(b.x,b.y,20))continue;
        for(let i=0;i<b.trail.length;i++){
            const t=b.trail[i],a=(i+1)/(b.trail.length+1)*0.35,s=b.r*cam.z*(0.3+0.7*(i/b.trail.length));
            ctx.save();ctx.globalAlpha=a;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(cam.sx2(t.x),cam.sy2(t.y),s,0,Math.PI*2);ctx.fill();ctx.restore()
        }
        const sx=cam.sx2(b.x),sy=cam.sy2(b.y),sr=b.r*cam.z*(b.crt?1.2:1);
        ctx.save();ctx.shadowColor=b.col;ctx.shadowBlur=b.crt?12:6;
        dCircG(ctx,sx,sy,sr,b.crt?"#ffffaa":b.col,b.crt?"#ffcc44":b.col,"#555",2*cam.z);ctx.restore()
    }
    if(mFlash>0){
        const a=mFlash/C.MF,sx=cam.sx2(mfx),sy=cam.sy2(mfy);
        ctx.save();ctx.globalAlpha=a*0.7;
        const g=ctx.createRadialGradient(sx,sy,0,sx,sy,18*a*cam.z);
        g.addColorStop(0,"rgba(255,240,180,0.9)");g.addColorStop(0.5,"rgba(255,200,80,0.4)");g.addColorStop(1,"rgba(255,150,30,0)");
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,18*a*cam.z,0,Math.PI*2);ctx.fill();ctx.restore()
    }
}

class Shape{
    constructor(x,y,type,variant){
        this.x=x;this.y=y;this.type=type;this.vr=variant;
        const c=C.SHAPES[type];
        this.si=c.si;this.bsz=c.sz;this.col=c.c;this.dk=c.d;this.ol=c.o;
        this.mhp=c.hp;this.hp=c.hp;this.sn=c.sn;this.sx2=c.sx;this.xp=c.xp;
        this.rot=Math.random()*Math.PI*2;this.rv=rn(-0.008,0.008);
        this.vx=0;this.vy=0;this.al=true;this.sc=1;this.ft=0;this.rbH=Math.random()*360;
        this.spT=C.SSF;this.puT=Math.random()*Math.PI*2;
        if(variant){const v=C.RARES[variant];this.sc=v.sc;if(variant!=="rainbow"){this.col=v.c;this.dk=v.d}}
    }
    get r(){return this.bsz*this.sc}
    getScore(){let b=ri(this.sn,this.sx2);if(!this.vr)return b;const v=C.RARES[this.vr];if(v.mm>1)b*=ri(v.mm,v.mx);if(v.bm>0)b+=ri(v.bm,v.bx);return Math.floor(b)}

class AITank{
    constructor(x,y,type){
        this.x=x;this.y=y;this.type=type;const c=C.AIT[type];
        this.spd=c.s;this.mhp=c.hp;this.hp=c.hp;this.dm=c.dm;this.rt=c.rt;this.col=c.c;this.rg=c.rg;this.agg=c.ag;this.lb=c.lb;
        this.r=22;this.angle=Math.random()*Math.PI*2;this.vx=0;this.vy=0;this.al=true;this.lv=1;this.score=0;
        this.wAng=Math.random()*Math.PI*2;this.wT=0;this.tgt=null;this.id="ai_"+Math.random().toString(36).substr(2,6);this.ft=0
    }
    update(tick){
        this.wT++;if(this.wT>C.AIDR){this.wT=0;this.wAng=Math.random()*Math.PI*2}
        this.lv=1+Math.floor(tick*C.AILR);this.r=22+Math.log(Math.max(1,this.lv))*1.5;this.mhp=C.AIT[this.type].hp+this.lv*5;
        const pd=dst(this.x,this.y,tank.x,tank.y);this.tgt=null;
        if(Math.random()<this.agg&&pd<this.rg*2)this.tgt={x:tank.x,y:tank.y};
        if(!this.tgt||this.type==="farmer"){
            let best=null,bd=this.rg;for(const s of shapes){const d=dst(this.x,this.y,s.x,s.y);if(d<bd){bd=d;best=s}}
            if(best)this.tgt={x:best.x,y:best.y}
        }
        let dodge=false;
        for(const b of bullets){if(b.oid===this.id)continue;if(dst(this.x,this.y,b.x,b.y)<120){
            const ba=ag(b.x,b.y,this.x,this.y);this.vx+=Math.cos(ba+Math.PI/2)*1.5;this.vy+=Math.sin(ba+Math.PI/2)*1.5;dodge=true;break}}
        if(!dodge){let ma=this.wAng;if(this.tgt)ma=ag(this.x,this.y,this.tgt.x,this.tgt.y);
            const td=this.tgt?dst(this.x,this.y,this.tgt.x,this.tgt.y):999;
            if(td>60){this.vx+=Math.cos(ma)*0.5;this.vy+=Math.sin(ma)*0.5}}
        this.vx*=0.9;this.vy*=0.9;
        const sp=Math.sqrt(this.vx*this.vx+this.vy*this.vy);if(sp>this.spd){const s=this.spd/sp;this.vx*=s;this.vy*=s}
        this.x+=this.vx;this.y+=this.vy;this.x=cl(this.x,this.r,C.MW-this.r);this.y=cl(this.y,this.r,C.MH-this.r);
        const rs=wallResolve(this.x,this.y,this.r);this.x=rs.x;this.y=rs.y;
        if(this.tgt){this.angle=ag(this.x,this.y,this.tgt.x,this.tgt.y);
            if(dst(this.x,this.y,this.tgt.x,this.tgt.y)<this.rg)fireBullet(this.x,this.y,this.angle,this.dm+this.lv,C.BS-2,1,this.rt,this.id,this,this.col)}
        if(this.hp<this.mhp)this.hp=Math.min(this.mhp,this.hp+0.01);if(this.ft>0)this.ft--
    }
    hit(d){this.hp-=d;this.ft=5;if(this.hp<=0)this.al=false}
    draw(){
        if(!cam.vis(this.x,this.y,this.r+40))return;
        const z=cam.z,sx=cam.sx2(this.x),sy=cam.sy2(this.y),sr=this.r*z;

        ctx.restore();

        dBar(ctx,sx,sy+sr+6*z,sr*2,4*z,this.hp/this.mhp,"#e05555");

        ctx.fillStyle="rgba(255,255,255,0.7)";ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=2;
        ctx.strokeText(this.lb+" Lv"+this.lv,sx,sy-sr-3*z);ctx.fillText(this.lb+" Lv"+this.lv,sx,sy-sr-3*z);ctx.restore()

function update(){
    tick++;
    if(curEvt){evtTimer--;if(evtTimer<=0){curEvt=null;nextEvt=ri(C.EMIN,C.EMAX)}}
    else{nextEvt--;if(nextEvt<=0){const ks=Object.keys(C.EVT),k=ks[ri(0,ks.length-1)];curEvt=k;evtTimer=C.EVT[k].dur;evtNotify=C.EVT[k].ic+" "+C.EVT[k].lb+": "+C.EVT[k].ds;evtNotifyT=240;if(k==="bossrush"){for(let i=0;i<3;i++)spawnBoss();evtTimer=60}}}
    if(evtNotifyT>0)evtNotifyT--;if(bossWarnT>0)bossWarnT--;

    tank.update();
    if(md&&tank.hp>0){const fired=fireBullet(tank.x,tank.y,tank.angle,tank.dmg,tank.bspd,tank.pen,tank.reload,"player",tank,"#00b0db");if(fired){tank.fire();cam.shake(C.FS)}}
    updateBullets();
    for(const s of shapes)s.update(tick,evtMig());
    for(let i=shapes.length-1;i>=0;i--)if(!shapes[i].al)shapes.splice(i,1);
    const deficit=C.MS-shapes.length,rate=evtStorm()?C.SSR*4:evtMig()?C.SSR*2:C.SSR;
    for(let i=0;i<Math.min(deficit,rate);i++)spawnShape(tank.x,tank.y,evtRareBoost());

    for(const ai of ais)ai.update(tick);
    for(let i=ais.length-1;i>=0;i--){if(!ais[i].al){ais.splice(i,1);aiRT.push(C.AIRT)}}
    for(let i=aiRT.length-1;i>=0;i--){aiRT[i]--;if(aiRT[i]<=0){aiRT.splice(i,1);spawnAI()}}

    bossTimer--;if(bossTimer<=0){bossTimer=C.BINT;spawnBoss()}
    for(const b of bosses)b.update();
    for(let i=bosses.length-1;i>=0;i--)if(!bosses[i].al)bosses.splice(i,1);

    for(const p of pPool)if(p.al)p.update();

    collide();

    cam.update(tank.x,tank.y,tank.fov);

    const d=tank.score-dScore;dScore+=Math.abs(d)<1?d:d*0.12;
    if(sFlash>0)sFlash--;
    for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.y-=1.6;p.x+=p.vx;p.li--;if(p.li<=0)pops.splice(i,1)}

    for(let i=0;i<SK.length;i++){if(keys[SK[i]]){tank.upgrade(SN[i]);keys[SK[i]]=false}}
}

function collide(){
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        for(let j=shapes.length-1;j>=0;j--){
            const s=shapes[j];if(!s.al)continue;
            if(dst(b.x,b.y,s.x,s.y)<b.r+s.r){
                const ha=ag(b.x,b.y,s.x,s.y);s.hit(b.dmg);s.kb(ha,C.SKB);
                b.pen--;if(b.pen<=0)b.al=false;
                emitP(b.x,b.y,"#ffdd88",5,6,3,15,"s");emitP((b.x+s.x)/2,(b.y+s.y)/2,s.col,3,2,3,15,"c");
                if(!s.al)onShapeDeath(s,b.oid,b.crt);
                if(!b.al){bullets.splice(i,1);break}
            }
        }
        if(!b.al&&bullets[i]===b)continue;if(bullets.indexOf(b)<0)continue;
        if(b.oid==="player"){
            for(const ai of ais){if(!ai.al)continue;if(dst(b.x,b.y,ai.x,ai.y)<b.r+ai.r){ai.hit(b.dmg);b.pen--;if(b.pen<=0){b.al=false;const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1)}emitP(b.x,b.y,"#ffaa88",4,4,3,12,"s");if(!ai.al)onAIDeath(ai);break}}
            if(!b.al)continue;
            for(const bs of bosses){if(!bs.al)continue;if(dst(b.x,b.y,bs.x,bs.y)<b.r+bs.r){bs.hit(b.dmg);b.pen--;if(b.pen<=0){b.al=false;const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1)}emitP(b.x,b.y,"#ff6644",6,5,4,15,"s");cam.shake(3);if(!bs.al)onBossDeath(bs);break}}
        }
        if(b.oid!=="player"&&b.al&&dst(b.x,b.y,tank.x,tank.y)<b.r+tank.r){
            tank.takeDmg(b.dmg);b.al=false;const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1);cam.shake(4);emitP(b.x,b.y,"#ff4444",5,4,3,12,"s")
        }
    }
}
function onShapeDeath(s,oid,crt){
    const pts=s.getScore(),xp=s.xp*(crt?2:1);
    let pc="#fff";if(s.vr){pc=s.vr==="rainbow"?hx(s.rbH,90,70):C.RARES[s.vr].c}
    if(oid==="player"){tank.score+=pts;tank.addXP(xp);dScore=dScore;sFlash=12;addPop(s.x,s.y,pts,pc,crt)}
    let pC=s.col;if(s.vr==="rainbow")pC=hx(s.rbH,85,60);
    let pN=C.SDP,pSp=3.5,pSz=4.5;
    if(s.type==="pentagon"||s.type==="hexagon"){pN*=2;pSp*=1.4;pSz*=1.3}
    if(s.vr){pN*=2;pSp*=1.3;pSz*=1.2}
    emitP(s.x,s.y,pC,pN,pSp,pSz,28,"c");emitP(s.x,s.y,"#fff",Math.floor(pN/2),pSp*1.5,pSz*0.6,17,"s");
    if(s.vr)emitP(s.x,s.y,C.RARES[s.vr].c,6,2,5,25,"g");
    let sh=2;if(s.type==="triangle")sh=4;if(s.type==="pentagon")sh=7;if(s.type==="hexagon")sh=12;if(s.vr)sh*=1.4;cam.shake(sh)
}
function onAIDeath(ai){const pts=500+ai.lv*100;tank.score+=pts;tank.addXP(pts);sFlash=12;addPop(ai.x,ai.y,pts,ai.col,false);emitP(ai.x,ai.y,ai.col,20,5,5,25,"c");emitP(ai.x,ai.y,"#fff",10,6,3,18,"s");cam.shake(7)}
function onBossDeath(bs){tank.score+=bs.scV;tank.addXP(bs.xpV);sFlash=12;addPop(bs.x,bs.y,bs.scV,"#ff4444",true);emitP(bs.x,bs.y,bs.col,40,7,7,35,"c");emitP(bs.x,bs.y,"#fff",20,8,4,25,"s");emitP(bs.x,bs.y,"#ffaa44",15,5,6,30,"g");cam.shake(24)}

function render(){
    ctx.fillStyle=C.BG;ctx.fillRect(0,0,W,H);
    const z=cam.z,vx=cam.x+cam.sx,vy=cam.y+cam.sy,vw=W/z,vh=H/z;

    for(const r2 of C.REG){if(r2.x+r2.w>vx&&r2.x<vx+vw&&r2.y+r2.h>vy&&r2.y<vy+vh){ctx.fillStyle=r2.t;ctx.fillRect(cam.sx2(r2.x),cam.sy2(r2.y),r2.w*z,r2.h*z)}}

    const gs=C.GS;ctx.strokeStyle=C.GC;ctx.lineWidth=1;ctx.beginPath();
    const gsx=Math.floor(vx/gs)*gs,gsy=Math.floor(vy/gs)*gs;
    for(let x=gsx;x<vx+vw+gs;x+=gs){const sx=cam.sx2(x);ctx.moveTo(sx,0);ctx.lineTo(sx,H)}
    for(let y=gsy;y<vy+vh+gs;y+=gs){const sy=cam.sy2(y);ctx.moveTo(0,sy);ctx.lineTo(W,sy)}
    ctx.stroke();

    const bw=C.BW;ctx.fillStyle="rgba(200,60,60,0.13)";
    if(vx<bw)ctx.fillRect(0,0,cam.sx2(bw),H);
    if(vy<bw)ctx.fillRect(0,0,W,cam.sy2(bw));
    if(vx+vw>C.MW-bw)ctx.fillRect(cam.sx2(C.MW-bw),0,W,H);
    if(vy+vh>C.MH-bw)ctx.fillRect(0,cam.sy2(C.MH-bw),W,H);
    ctx.strokeStyle="rgba(200,60,60,0.35)";ctx.lineWidth=3;
    ctx.strokeRect(cam.sx2(0),cam.sy2(0),C.MW*z,C.MH*z);

    for(const w of walls)w.draw();
    for(const s of shapes)s.draw();
    for(const ai of ais)ai.draw();
    for(const b of bosses)b.draw();
    drawBullets();
    tank.draw();
    for(const p of pPool)if(p.al)p.draw();
    for(const p of pops){
        if(!cam.vis(p.x,p.y,30))continue;
        const a=cl(p.li/p.ml,0,1),e=a<0.3?a/0.3:1,bn=p.li>p.ml-6?1.15:1;
        const sz2=Math.floor(17*(p.big?1.4:1)*bn),sx=cam.sx2(p.x),sy=cam.sy2(p.y);
        ctx.save();ctx.globalAlpha=e;ctx.font=`bold ${sz2}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.strokeStyle="rgba(0,0,0,0.55)";ctx.lineWidth=3.5;ctx.lineJoin="round";ctx.strokeText(p.tx,sx,sy);ctx.fillStyle=p.col;ctx.fillText(p.tx,sx,sy);ctx.restore()
    }

    drawHUD();
    drawMinimap()
}

function drawHUD(){
    const cx=W/2;
    ctx.save();ctx.fillStyle="rgba(20,20,30,0.55)";rr(0,ctx,cx-120,10,240,46,12);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.45)";ctx.font="600 10px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("SCORE",cx,22);
    const fl=sFlash>0?1+sFlash*0.008:1;ctx.font=`bold ${Math.floor(24*fl)}px 'Exo 2',sans-serif`;
    ctx.strokeStyle="rgba(0,0,0,0.4)";ctx.lineWidth=3;ctx.lineJoin="round";const sc=fs(Math.floor(dScore));
    ctx.strokeText(sc,cx,40);ctx.fillStyle=sFlash>0?"#ffe566":"#fff";ctx.fillText(sc,cx,40);ctx.restore();

    const bw2=300,bh2=8,bx=cx-bw2/2,by=60;
    ctx.save();ctx.fillStyle="rgba(20,20,30,0.45)";rr(0,ctx,bx-8,by-4,bw2+16,bh2+22,8);ctx.fill();
    ctx.fillStyle="rgba(0,0,0,0.4)";rr(0,ctx,bx,by,bw2,bh2,bh2/2);ctx.fill();
    const xr=cl(tank.xp/tank.xpN,0,1);
    if(xr>0){const g=ctx.createLinearGradient(bx,by,bx+bw2*xr,by);g.addColorStop(0,"#ffcc44");g.addColorStop(1,"#ff8800");ctx.fillStyle=g;rr(0,ctx,bx,by,Math.max(1,bw2*xr),bh2,bh2/2);ctx.fill()}
    ctx.font="bold 10px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#ffcc44";ctx.fillText("Lv "+tank.lv,bx,by+bh2+10);
    ctx.textAlign="right";ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillText(Math.floor(tank.xp)+"/"+tank.xpN+" XP",bx+bw2,by+bh2+10);
    if(tank.pts>0){ctx.textAlign="center";ctx.fillStyle="#66ff66";ctx.fillText(tank.pts+" point"+(tank.pts>1?"s":"")+" available!",cx,by+bh2+10)}
    ctx.restore();

    const hw=260,hh=10,hx2=cx-hw/2,hy=H-38;
    ctx.save();ctx.fillStyle="rgba(20,20,30,0.45)";rr(0,ctx,hx2-6,hy-5,hw+12,hh+10,8);ctx.fill();
    const hr=cl(tank.hp/tank.mhp,0,1);ctx.fillStyle="rgba(0,0,0,0.4)";rr(0,ctx,hx2,hy,hw,hh,hh/2);ctx.fill();
    if(hr>0){const hc=hr>0.5?"#44ee44":hr>0.25?"#eeee44":"#ee4444";ctx.fillStyle=hc;rr(0,ctx,hx2,hy,Math.max(1,hw*hr),hh,hh/2);ctx.fill()}
    ctx.font="bold 10px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.fillText(Math.ceil(tank.hp)+"/"+Math.floor(tank.mhp),cx,hy+hh/2);ctx.restore();

    if(tank.pts>0){
        const px=14,py=H/2-SN.length*22;
        ctx.save();ctx.fillStyle="rgba(20,20,30,0.6)";rr(0,ctx,px-6,py-24,207,SN.length*22+34,10);ctx.fill();
        ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;rr(0,ctx,px-6,py-24,207,SN.length*22+34,10);ctx.stroke();
        ctx.font="bold 11px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#ffcc44";ctx.fillText("UPGRADES ("+tank.pts+"pts)",px,py-10);
        for(let i=0;i<SN.length;i++){
            const st=SN[i],y=py+i*22+6,lv=tank.stats[st];
            ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="500 10px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillText("["+SK[i]+"] "+SL[st],px,y);
            const barX=px+120;ctx.fillStyle="rgba(0,0,0,0.3)";rr(0,ctx,barX,y-4,60,8,3);ctx.fill();
            if(lv>0){ctx.fillStyle=SC2[st];rr(0,ctx,barX,y-4,60*(lv/C.MST),8,3);ctx.fill()}
            ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="bold 9px 'Exo 2',sans-serif";ctx.textAlign="right";ctx.fillText(lv+"/"+C.MST,px+195,y)
        }
        ctx.restore()
    }

    ctx.save();ctx.font="500 10px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.textBaseline="bottom";ctx.fillStyle="rgba(255,255,255,0.22)";ctx.fillText("WASD move | Mouse aim | Click shoot | 1-8 upgrade",14,H-10);ctx.restore();

    if(bossWarnT>0){const a=Math.min(1,bossWarnT/30);ctx.save();ctx.globalAlpha=a;ctx.fillStyle="rgba(30,0,0,0.6)";rr(0,ctx,cx-220,90,440,40,10);ctx.fill();ctx.strokeStyle="rgba(255,80,80,0.5)";ctx.lineWidth=1.5;rr(0,ctx,cx-220,90,440,40,10);ctx.stroke();ctx.font="bold 20px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#ff6666";ctx.fillText(bossWarn,cx,110);ctx.restore()}
    if(evtNotifyT>0){const a=Math.min(1,evtNotifyT/30);ctx.save();ctx.globalAlpha=a;ctx.fillStyle="rgba(20,20,40,0.7)";rr(0,ctx,cx-250,135,500,36,10);ctx.fill();ctx.font="bold 15px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#88ddff";ctx.fillText(evtNotify,cx,153);ctx.restore()}
    if(curEvt){const ev=C.EVT[curEvt],sec=Math.ceil(evtTimer/60);ctx.save();ctx.font="bold 11px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle="rgba(255,200,100,0.6)";ctx.fillText(ev.ic+" "+ev.lb+" ("+sec+"s)",cx,178);ctx.restore()}
}

let mmRA=0;
function drawMinimap(){
    mmRA+=0.018;
    const mm=C.MMS,mg=14,ox=W-mm-mg,oy=H-mm-mg,sx=mm/C.MW,sy=mm/C.MH;
    ctx.save();ctx.fillStyle="rgba(30,30,40,0.72)";rr(0,ctx,ox-4,oy-4,mm+8,mm+8,8);ctx.fill();ctx.strokeStyle="rgba(255,255,255,0.18)";ctx.lineWidth=1.5;rr(0,ctx,ox-4,oy-4,mm+8,mm+8,8);ctx.stroke();
    ctx.beginPath();rr(0,ctx,ox,oy,mm,mm,6);ctx.clip();
    ctx.fillStyle="rgba(180,175,165,0.35)";ctx.fillRect(ox,oy,mm,mm);
    ctx.fillStyle="rgba(100,95,88,0.55)";for(const w of walls)ctx.fillRect(ox+w.x*sx,oy+w.y*sy,Math.max(1.5,w.w*sx),Math.max(1.5,w.h*sy));
    for(const s of shapes){ctx.globalAlpha=s.vr==="shadow"?0.15:s.vr?0.8:0.5;ctx.fillStyle=s.vr==="rainbow"?hx(s.rbH,90,60):s.col;const sz2=s.vr?3:1.5;ctx.fillRect(ox+s.x*sx-sz2/2,oy+s.y*sy-sz2/2,sz2,sz2)}
    ctx.globalAlpha=1;
    for(const ai of ais){ctx.fillStyle=ai.col;ctx.beginPath();ctx.arc(ox+ai.x*sx,oy+ai.y*sy,2.5,0,Math.PI*2);ctx.fill()}
    for(const b of bosses){ctx.fillStyle=b.col;ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ox+b.x*sx,oy+b.y*sy,5,0,Math.PI*2);ctx.fill();ctx.stroke();
        ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle="rgba(255,60,60,0.3)";ctx.beginPath();ctx.arc(ox+b.x*sx,oy+b.y*sy,10,0,Math.PI*2);ctx.fill();ctx.restore()}
    const rcx=ox+mm/2,rcy=oy+mm/2,rrr=mm*0.7;
    ctx.save();ctx.beginPath();ctx.moveTo(rcx,rcy);ctx.arc(rcx,rcy,rrr,mmRA-0.6,mmRA,false);ctx.closePath();
    const sw=ctx.createLinearGradient(rcx+Math.cos(mmRA)*rrr,rcy+Math.sin(mmRA)*rrr,rcx+Math.cos(mmRA-0.8)*rrr,rcy+Math.sin(mmRA-0.8)*rrr);
    sw.addColorStop(0,"rgba(0,200,180,0.25)");sw.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=sw;ctx.fill();ctx.restore();
    const px=ox+tank.x*sx,py=oy+tank.y*sy;
    ctx.fillStyle="rgba(0,176,219,0.3)";ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#00b0db";ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,0.5)";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+Math.cos(tank.angle)*8,py+Math.sin(tank.angle)*8);ctx.stroke();
    ctx.restore();
    ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="bold 9px 'Exo 2',sans-serif";ctx.textAlign="right";ctx.fillText(Math.floor(tank.x)+", "+Math.floor(tank.y),ox+mm-2,oy+mm+13)
}

function loop(){update();render();requestAnimationFrame(loop)}
loop();
</script>
