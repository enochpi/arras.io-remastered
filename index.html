function dst(a,b,c,d){const x=c-a,y=d-b;return Math.sqrt(x*x+y*y)}
function dst2(a,b,c,d){const x=c-a,y=d-b;return x*x+y*y}
function cl(v,a,b){return v<a?a:v>b?b:v}
function lr(a,b,t){return a+(b-a)*t}
function rn(a,b){return Math.random()*(b-a)+a}
function ri(a,b){return Math.floor(rn(a,b+1))}
function ag(a,b,c,d){return Math.atan2(d-b,c-a)}
function hx(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return Math.round(255*(l-a*Math.max(Math.min(k-3,9-k,1),-1))).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`}
function xpFor(lv){return Math.floor(C.XPB*Math.pow(C.XPS,lv))}
function pw(w){let t=0;for(const k in w)t+=w[k];let r=Math.random()*t;for(const k in w){r-=w[k];if(r<=0)return k}return Object.keys(w)[0]}
function fsc(n){if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"k";return""+n}
function rr(c,x,y,w,h,rd){if(w<1||h<1)return;rd=Math.min(rd||0,w/2,h/2);c.beginPath();c.moveTo(x+rd,y);c.lineTo(x+w-rd,y);c.quadraticCurveTo(x+w,y,x+w,y+rd);c.lineTo(x+w,y+h-rd);c.quadraticCurveTo(x+w,y+h,x+w-rd,y+h);c.lineTo(x+rd,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rd);c.lineTo(x,y+rd);c.quadraticCurveTo(x,y,x+rd,y);c.closePath()}
function dP(c,x,y,r,si,rot,col,ol,lw,star){
  if(r<1)return;
  if(si===0){c.beginPath();c.arc(x,y,r,0,6.283);c.fillStyle=col;c.fill();if(ol){c.strokeStyle=ol;c.lineWidth=lw||2;c.stroke()}return;}
  c.beginPath();
  if(star){for(let i=0;i<si*2;i++){const a=(Math.PI/si)*i+rot;const ir=i%2===0?r:r*0.45;i===0?c.moveTo(x+Math.cos(a)*ir,y+Math.sin(a)*ir):c.lineTo(x+Math.cos(a)*ir,y+Math.sin(a)*ir)}}
  else{for(let i=0;i<si;i++){const a=(6.283/si)*i+rot;i===0?c.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}}
  c.closePath();c.fillStyle=col;c.fill();
  if(ol){c.strokeStyle=ol;c.lineWidth=lw||2;c.lineJoin="round";c.stroke()}
}
function dC(c,x,y,r,col,ol,lw){if(r<1)return;c.beginPath();c.arc(x,y,r,0,6.283);c.fillStyle=col;c.fill();if(ol){c.strokeStyle=ol;c.lineWidth=lw||2;c.stroke()}}
function dBar(c,x,y,w,h,rat,col){if(rat>=1||w<2)return;rat=cl(rat,0,1);const rx=x-w/2;c.fillStyle="rgba(0,0,0,0.3)";rr(c,rx,y,w,h,h/2);c.fill();if(rat>0){c.fillStyle=col;rr(c,rx,y,Math.max(1,w*rat),h,h/2);c.fill()}}

const cam={x:0,y:0,z:1,ox:0,oy:0,si:0,
  shake(v){this.si=Math.max(this.si,Math.min(v,7))},
  update(tx,ty,fov){
    this.z=cl(1/fov,0.22,1.5);
    const vw=W/this.z,vh=H/this.z;
    this.x=lr(this.x,tx-vw/2,C.CLERP);this.y=lr(this.y,ty-vh/2,C.CLERP);
    this.x=cl(this.x,0,Math.max(0,C.MW-vw));this.y=cl(this.y,0,Math.max(0,C.MH-vh));
    if(this.si>0.4){this.ox=Math.round((Math.random()-0.5)*this.si);this.oy=Math.round((Math.random()-0.5)*this.si);this.si*=C.CSD}
    else{this.ox=0;this.oy=0;this.si=0}
  },
  SX(wx){return Math.round((wx-this.x)*this.z)+this.ox},
  SY(wy){return Math.round((wy-this.y)*this.z)+this.oy},
  WX(sx){return(sx-this.ox)/this.z+this.x},
  WY(sy){return(sy-this.oy)/this.z+this.y},
  vis(wx,wy,m){m=m||80;return wx>this.x-m&&wx<this.x+W/this.z+m&&wy>this.y-m&&wy<this.y+H/this.z+m}
};

function spawnParticles(x,y,col,n,spd,life,sz){if(particles.length>80)return;n=Math.min(n,7);for(let i=0;i<n;i++){const a=rn(0,6.283),s=rn(spd*0.4,spd);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life,ml:life,sz:rn(sz*0.5,sz),rot:rn(0,6.28),rv:rn(-0.2,0.2)});}}
function spawnExplosion(x,y,col,big){const n=big?28:14,spd=big?5.5:3.2,life=big?55:35,sz=big?5:3;spawnParticles(x,y,col,n,spd,life,sz);const rc=big?16:8;for(let i=0;i<rc;i++){const a=i*(6.283/rc);particles.push({x,y,vx:Math.cos(a)*(big?4:2.5),vy:Math.sin(a)*(big?4:2.5),col:"#fff",life:big?30:18,ml:big?30:18,sz:big?3:2,rot:0,rv:0})}}
function updParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.rot+=p.rv;p.life--;if(p.life<=0)particles.splice(i,1);}}
function drwParticles(){const z=cam.z;for(const p of particles){if(!cam.vis(p.x,p.y,p.sz+2))continue;const a=p.life/p.ml;ctx.globalAlpha=a*0.8;ctx.fillStyle=p.col;const sr=Math.max(1,p.sz*z);ctx.fillRect(cam.SX(p.x)-sr/2,cam.SY(p.y)-sr/2,sr,sr);}ctx.globalAlpha=1;}

function updAI(tk){
  for(const ai of ais){
    if(!ai.al)continue;
    ai.wT++;if(ai.wT>130){ai.wT=0;ai.wA=rn(0,6.28)}
    ai.lv=1+Math.floor(tk*C.AILR);
    const timeScale=1+tick*0.00012;
    ai.gs=1+Math.floor(ai.score/500)*0.10;
    ai.r=20+Math.min(8,Math.log(Math.max(1,ai.lv)));
    ai.mhp=(C.AIT[ai.tp].hp+ai.lv*4)*timeScale*ai.gs;
    let tgt=null;
    if(Math.random()<ai.agg&&dst2(ai.x,ai.y,tank.x,tank.y)<ai.rg*2*ai.rg*2)tgt={x:tank.x,y:tank.y};
    if(!tgt){
      // FIX: use dst2 (no sqrt) for performance
      let bd2=ai.rg*ai.rg;
      for(let j=0;j<shapes.length;j+=8){const s=shapes[j];const d2=dst2(ai.x,ai.y,s.x,s.y);if(d2<bd2){bd2=d2;tgt={x:s.x,y:s.y}}}
    }
    let ma=ai.wA;if(tgt)ma=ag(ai.x,ai.y,tgt.x,tgt.y);
    ai.vx+=Math.cos(ma)*0.38;ai.vy+=Math.sin(ma)*0.38;ai.vx*=0.9;ai.vy*=0.9;
    const sp=Math.sqrt(ai.vx*ai.vx+ai.vy*ai.vy);const maxSpd=C.AIT[ai.tp].s*(1+ai.gs*0.15);
    if(sp>maxSpd){const s=maxSpd/sp;ai.vx*=s;ai.vy*=s}
    ai.x+=ai.vx;ai.y+=ai.vy;ai.x=cl(ai.x,ai.r,C.MW-ai.r);ai.y=cl(ai.y,ai.r,C.MH-ai.r);
    if(tgt&&dst2(ai.x,ai.y,tgt.x,tgt.y)<ai.rg*ai.rg){ai.angle=ag(ai.x,ai.y,tgt.x,tgt.y);const dmgScale=(C.AIT[ai.tp].dm+ai.lv)*ai.gs;fire1(ai.x,ai.y,ai.angle,dmgScale,C.BS-2,1,ai.rt,ai.id,ai,ai.col,C.BR);}
    if(ai.hp<ai.mhp)ai.hp+=0.015*ai.gs;if(ai.ft>0)ai.ft--;
  }
}

// ─── MAIN UPDATE ────────────────────────────────────────────────────────────

  tick++;saveT++;if(saveT>1800){saveT=0;saveGame()}
  if(curEvt){evtT--;if(evtT<=0){curEvt=null;nextEvt=ri(C.EMIN,C.EMAX)}}
  else{nextEvt--;if(nextEvt<=0){const ks=Object.keys(C.EVT),k=ks[ri(0,ks.length-1)];curEvt=k;evtT=C.EVT[k].dur;evtN=C.EVT[k].ic+" "+C.EVT[k].lb+": "+C.EVT[k].ds;evtNT=160;if(k==="bossrush"){for(let i=0;i<4;i++)spawnBoss();evtT=60}}}
  if(evtNT>0)evtNT--;if(bossWT>0)bossWT--;
  if(!tank.pendingTier)tank.update();
  if((md||autoFire)&&tank.hp>0&&!tank.pendingTier){
    const allBarrels=[...tank.cls.br,...tank.extraBarrels];
    fireM(tank.x,tank.y,allBarrels,tank.angle,tank.eDmg,tank.eSpd,tank.ePen,tank.eRl,"player",tank,tank._col||"#00b0db",tank.gs);

    const droneOnly=allBarrels.filter(b=>b.drone);
    if(droneOnly.length>0){
      let nearTarget=null,nearD2=700*700;
      for(let _si=0;_si<shapes.length;_si+=4){const s=shapes[_si];if(!s.al)continue;const d2=dst2(tank.x,tank.y,s.x,s.y);if(d2<nearD2){nearD2=d2;nearTarget=s}}
      for(const ai of ais){if(ai.al){const d2=dst2(tank.x,tank.y,ai.x,ai.y);if(d2<nearD2){nearD2=d2;nearTarget=ai}}}
      for(const b of bosses){if(b.al){const d2=dst2(tank.x,tank.y,b.x,b.y);if(d2<nearD2){nearD2=d2;nearTarget=b}}}
      if(nearTarget)fireM(tank.x,tank.y,droneOnly,tank.angle,tank.eDmg,tank.eSpd,tank.ePen,tank.eRl,"player",tank,tank._col||"#00e8ca",tank.gs);
    }
  }
  updB();updParticles();updCombo();
  const isStm=curEvt==="storm",isRr=curEvt==="rare",isMeteor=curEvt==="meteor";
  updShapes(tick,false);
  for(let i=shapes.length-1;i>=0;i--)if(!shapes[i].al)shapes.splice(i,1);
  const def=C.MS-shapes.length,rate=isStm?C.SSR*3:isMeteor?C.SSR*2:C.SSR;
  for(let i=0;i<Math.min(def,rate);i++)spawnS(tank.x,tank.y,isRr);
  for(let i=megaS.length-1;i>=0;i--){const m=megaS[i];if(!m.al){megaS.splice(i,1);continue}m.rot+=m.rv;m.vx*=0.97;m.vy*=0.97;m.x+=m.vx;m.y+=m.vy;m.x=cl(m.x,m.r,C.MW-m.r);m.y=cl(m.y,m.r,C.MH-m.r);if(m.ft>0)m.ft--;}
  megaT--;if(megaT<=0){megaT=ri(280,500);spawnMega()}
  if(ais.length<C.AIN&&tick>=3600){const elapsed=tick-3600;const spawnInterval=Math.max(120,1800-Math.floor(elapsed/8));if(tick%Math.floor(spawnInterval)===0)spawnAI();}
  updAI(tick);
  for(let i=ais.length-1;i>=0;i--){if(!ais[i].al){
    // FIX: respawn timer scaling — decreases over time, min 120 ticks (2s)
    aiRT.push(Math.max(120,C.AIRT-Math.floor(tick/1800)));
    ais.splice(i,1);
  }}
  for(let i=aiRT.length-1;i>=0;i--){aiRT[i]--;if(aiRT[i]<=0){aiRT.splice(i,1);if(ais.length<C.AIN)spawnAI()}}
  bossT--;if(bossT<=0){bossT=C.BINT;const bCnt=Math.min(6,1+Math.floor(tick/21600));for(let i=0;i<bCnt;i++)spawnBoss();bossWave++;announceBossWave(bossWave);}

  collide();
  const d=tank.score-dSc;dSc+=Math.abs(d)<1?d:d*0.1;if(sFl>0)sFl--;

}

// ─── SPATIAL GRID ────────────────────────────────────────────────────────────
const GRID_CELL=120;
const spatialGrid={};
function gridKey(x,y){return`${Math.floor(x/GRID_CELL)},${Math.floor(y/GRID_CELL)}`}
function gridInsert(obj){const k=gridKey(obj.x,obj.y);if(!spatialGrid[k])spatialGrid[k]=[];spatialGrid[k].push(obj);}
function gridQuery(x,y,r){const cx=Math.floor(x/GRID_CELL),cy=Math.floor(y/GRID_CELL);const result=[];for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){const cell=spatialGrid[`${cx+dx},${cy+dy}`];if(cell)for(const o of cell)result.push(o);}return result;}
function buildGrid(){for(const k in spatialGrid)delete spatialGrid[k];for(const s of shapes){if(s.al)gridInsert(s);}}

function collide(){
  buildGrid();
  const toRemove=new Set();
  for(let i=0;i<bullets.length;i++){
    if(toRemove.has(i))continue;
    const b=bullets[i];const bx=b.x,by=b.y;let removed=false;
    const nearShapes=gridQuery(bx,by,b.r+50);
    for(const s of nearShapes){if(!s.al)continue;const rad=b.r+s.r;if(dst2(bx,by,s.x,s.y)<rad*rad){s.hit(b.dm);s.kb(ag(bx,by,s.x,s.y),C.SKB);sHit();b.pn--;if(!s.al)onSD(s,b.oid,b.cr);if(b.pn<=0){toRemove.add(i);removed=true;break}}}
    if(removed)continue;
    for(let j=megaS.length-1;j>=0;j--){const m=megaS[j];if(!m.al)continue;const rad=b.r+m.r;if(dst2(bx,by,m.x,m.y)<rad*rad){m.hit(b.dm);m.kb(ag(bx,by,m.x,m.y),C.SKB*0.08);b.pn--;if(!m.al)onMD(m,b.oid,b.cr);if(b.pn<=0){toRemove.add(i);removed=true;break}}}
    if(removed)continue;
    if(b.oid==="player"){
      for(let j=ais.length-1;j>=0;j--){const ai=ais[j];if(!ai.al)continue;const rad=b.r+ai.r;if(dst2(bx,by,ai.x,ai.y)<rad*rad){ai.hp-=b.dm;ai.ft=3;b.pn--;if(ai.hp<=0&&ai.al){ai.al=false;onAD(ai)}if(b.pn<=0){toRemove.add(i);removed=true;break}}}
      if(removed)continue;
      for(let j=bosses.length-1;j>=0;j--){const bs=bosses[j];if(!bs.al)continue;const rad=b.r+bs.r;if(dst2(bx,by,bs.x,bs.y)<rad*rad){bs.hp-=b.dm;bs.ft=3;b.pn--;if(bs.hp<=0&&bs.al){bs.al=false;onBD(bs)}if(b.pn<=0){toRemove.add(i);removed=true;break}}}
      if(removed)continue;
    }
    if(b.oid!=="player"){const rad=b.r+tank.r;if(dst2(bx,by,tank.x,tank.y)<rad*rad){tank.takeDmg(b.dm,bx,by);toRemove.add(i);}}
  }
  const idxs=[...toRemove].sort((a,b)=>b-a);for(const idx of idxs)bullets.splice(idx,1);
  if(tick%3===0){
    for(let j=shapes.length-1;j>=0;j--){const s=shapes[j];if(!s.al)continue;const rad=tank.r+s.r;if(dst2(tank.x,tank.y,s.x,s.y)<rad*rad){const shapePow=C.SHAPES[s.tp].hp*TIER_HP[s.tier||0]*(s.vr?1.4:1);const tankPow=(C.THP+tank.bonusHp)*0.08;tank.takeDmg(shapePow*0.012);s.hp-=tankPow;s.ft=2;if(s.hp<=0&&s.al){s.al=false;onSD(s,"player",false)}const a=ag(tank.x,tank.y,s.x,s.y);s.kb(a,1.5);tank.vx-=Math.cos(a)*0.4;tank.vy-=Math.sin(a)*0.4;if(isDead)return;}}
    for(let j=megaS.length-1;j>=0;j--){const m=megaS[j];if(!m.al)continue;const rad=tank.r+m.r;if(dst2(tank.x,tank.y,m.x,m.y)<rad*rad){tank.takeDmg(m.mhp*0.004);m.hp-=(C.THP+tank.bonusHp)*0.05;m.ft=2;if(m.hp<=0&&m.al){m.al=false;onMD(m,"player",false)}if(isDead)return;}}
  }
}

// ─── CLASS PICKER ────────────────────────────────────────────────────────────
function drawCP(){
  const opts=C.TREE[tank.tc];
  // FIX: clear pendingTier if no upgrades exist to prevent permanent freeze
  if(!opts||opts.length===0){tank.pendingTier=null;return;}
  const available=opts.filter(k=>C.CL[k]&&C.CL[k].lv<=tank.lv);
  if(available.length===0){tank.pendingTier=null;return;}
  const pw2=320,ph=available.length*40+70,px=W/2-pw2/2,py=H/2-ph/2;
  ctx.fillStyle="rgba(0,0,0,0.75)";ctx.fillRect(0,0,W,H);
  ctx.save();ctx.fillStyle="rgba(5,5,22,0.97)";rr(ctx,px,py,pw2,ph,14);ctx.fill();ctx.strokeStyle="rgba(255,200,50,0.6)";ctx.lineWidth=2;rr(ctx,px,py,pw2,ph,14);ctx.stroke();
  ctx.font="bold 13px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle="#ffcc44";ctx.fillText("Level "+tank.lv+" — Upgrade Class",W/2,py+20);
  ctx.font="9px 'Exo 2',sans-serif";ctx.fillStyle="rgba(255,255,255,0.35)";ctx.fillText(tank.cls.lb+" → choose your next form",W/2,py+36);
  let yy=py+50;
  for(const k of available){
    const tc=C.CL[k];if(!tc)continue;
    const hov=mx>=px+8&&mx<=px+pw2-8&&my>=yy&&my<=yy+34;
    ctx.fillStyle=hov?"rgba(255,220,80,0.12)":"rgba(255,255,255,0.05)";rr(ctx,px+8,yy,pw2-16,34,7);ctx.fill();
    if(hov){ctx.strokeStyle="rgba(255,220,80,0.3)";ctx.lineWidth=1;rr(ctx,px+8,yy,pw2-16,34,7);ctx.stroke()}
    ctx.font="bold 12px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle=hov?"#ffe066":"#44ddff";ctx.fillText(tc.lb,px+18,yy+13);
    ctx.font="400 8px 'Exo 2',sans-serif";ctx.fillStyle="rgba(200,200,200,0.65)";ctx.fillText(tc.ds,px+18,yy+26);
    ctx.textAlign="right";ctx.font="bold 7px 'Exo 2',sans-serif";
    const hmc=tc.hm>1.1?"#4e4":tc.hm<0.9?"#e44":"#888";const smc=tc.sm>1.1?"#4e4":tc.sm<0.9?"#e44":"#888";
    ctx.fillStyle=hmc;ctx.fillText("HP×"+tc.hm.toFixed(1),px+pw2-18,yy+13);ctx.fillStyle=smc;ctx.fillText("Spd×"+tc.sm.toFixed(1),px+pw2-18,yy+26);
    yy+=40;
  }
  ctx.restore();
}

// ─── INPUT HANDLERS ──────────────────────────────────────────────────────────
cvs.addEventListener("click",e=>{
  if(tank.pendingTier){
    const opts=(C.TREE[tank.tc]||[]).filter(k=>C.CL[k]&&C.CL[k].lv<=tank.lv);
    if(!opts.length){tank.pendingTier=null;return;}
    const pw2=320,ph=opts.length*40+70,py=H/2-ph/2;
    let yy=py+50;
    for(const k of opts){
      if(e.clientY>=yy&&e.clientY<yy+34){
        // FIX: was tank.setClass(k) which didn't exist — now inline
        tank.tc=k;tank.pendingTier=null;tank.recalc();tank.hp=Math.min(tank.hp,tank.mhp);sUp();return;
      }
      yy+=40;
    }
  }
  if(isDead){
    const bx=W/2-90,bby=H/2-280/2+280-52,bw=180,bh=34;
    if(e.clientX>=bx&&e.clientX<=bx+bw&&e.clientY>=bby&&e.clientY<=bby+bh)respawn();
  }
});
window.addEventListener("keydown",e=>{if(e.key==="Escape"){if(tank.pendingTier)tank.pendingTier=null;}});

// ─── LOOP ────────────────────────────────────────────────────────────────────
// Init tank state
tank.nextCardScore=C.CARD_BASE_SCORE;
tank.recalc();
cam.x=tank.x-W/2;cam.y=tank.y-H/2;
function loop(){update();render();requestAnimationFrame(loop)}
loop();
