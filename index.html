function dst(a,b,c,d){const x=c-a,y=d-b;return Math.sqrt(x*x+y*y)}
function dst2(a,b,c,d){const x=c-a,y=d-b;return x*x+y*y}// squared - no sqrt, fast for collision
function cl(v,a,b){return v<a?a:v>b?b:v}
function lr(a,b,t){return a+(b-a)*t}
function rn(a,b){return Math.random()*(b-a)+a}
function ri(a,b){return Math.floor(rn(a,b+1))}
function ag(a,b,c,d){return Math.atan2(d-b,c-a)}
function hx(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return Math.round(255*(l-a*Math.max(Math.min(k-3,9-k,1),-1))).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`}
function xpFor(lv){return Math.floor(C.XPB*Math.pow(C.XPS,lv))}
function pw(w){let t=0;for(const k in w)t+=w[k];let r=Math.random()*t;for(const k in w){r-=w[k];if(r<=0)return k}return Object.keys(w)[0]}
function fsc(n){if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"k";return""+n}
// wall utils removed - no walls
function rr(c,x,y,w,h,rd){if(w<1||h<1)return;rd=Math.min(rd||0,w/2,h/2);c.beginPath();c.moveTo(x+rd,y);c.lineTo(x+w-rd,y);c.quadraticCurveTo(x+w,y,x+w,y+rd);c.lineTo(x+w,y+h-rd);c.quadraticCurveTo(x+w,y+h,x+w-rd,y+h);c.lineTo(x+rd,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rd);c.lineTo(x,y+rd);c.quadraticCurveTo(x,y,x+rd,y);c.closePath()}
function dP(c,x,y,r,si,rot,col,ol,lw,star){
  if(r<1)return;
  c.beginPath();
  if(star){
    for(let i=0;i<si*2;i++){const a=(Math.PI/si)*i+rot;const ir=i%2===0?r:r*0.45;i===0?c.moveTo(x+Math.cos(a)*ir,y+Math.sin(a)*ir):c.lineTo(x+Math.cos(a)*ir,y+Math.sin(a)*ir)}
  }else{
    for(let i=0;i<si;i++){const a=(6.283/si)*i+rot;i===0?c.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  }
  c.closePath();c.fillStyle=col;c.fill();
  if(ol){c.strokeStyle=ol;c.lineWidth=lw||2;c.lineJoin="round";c.stroke()}
}
function dC(c,x,y,r,col,ol,lw){if(r<1)return;c.beginPath();c.arc(x,y,r,0,6.283);c.fillStyle=col;c.fill();if(ol){c.strokeStyle=ol;c.lineWidth=lw||2;c.stroke()}}
function dBar(c,x,y,w,h,rat,col){if(rat>=1||w<2)return;rat=cl(rat,0,1);const rx=x-w/2;c.fillStyle="rgba(0,0,0,0.3)";rr(c,rx,y,w,h,h/2);c.fill();if(rat>0){c.fillStyle=col;rr(c,rx,y,Math.max(1,w*rat),h,h/2);c.fill()}}

const cam={x:0,y:0,z:1,ox:0,oy:0,si:0,
  shake(v){this.si=Math.max(this.si,Math.min(v,7))},
  update(tx,ty,fov){
    this.z=cl(1/fov,0.22,1.5);
    const vw=W/this.z,vh=H/this.z;
    this.x=lr(this.x,tx-vw/2,C.CLERP);
    this.y=lr(this.y,ty-vh/2,C.CLERP);
    this.x=cl(this.x,0,Math.max(0,C.MW-vw));
    this.y=cl(this.y,0,Math.max(0,C.MH-vh));
    if(this.si>0.4){this.ox=Math.round((Math.random()-0.5)*this.si);this.oy=Math.round((Math.random()-0.5)*this.si);this.si*=C.CSD}
    else{this.ox=0;this.oy=0;this.si=0}
  },
  SX(wx){return Math.round((wx-this.x)*this.z)+this.ox},
  SY(wy){return Math.round((wy-this.y)*this.z)+this.oy},
  WX(sx){return(sx-this.ox)/this.z+this.x},
  WY(sy){return(sy-this.oy)/this.z+this.y},
  vis(wx,wy,m){m=m||80;return wx>this.x-m&&wx<this.x+W/this.z+m&&wy>this.y-m&&wy<this.y+H/this.z+m}
};

const bullets=[];

// FIX: use bsz param properly, pn initialized correctly
function fire1(x,y,a,dm,sp,pn,rt,oid,ow,col,bsz){
  if(bullets.length>=C.MAX_BULLETS)return false;
  const cd=bCD[oid]||0;if(cd>0)return false;
  bCD[oid]=Math.max(1,rt);
  const or=(ow&&ow.r)||26;
  const bx=x+Math.cos(a)*(or+8),by=y+Math.sin(a)*(or+8);
  const critRate=oid==="player"?tank.eCrit:C.CRIT;
  const critMult=oid==="player"?tank.eCritM:C.CRITM;
  const cr=Math.random()<critRate;
  const finalBsz=(bsz||C.BR)+(oid==="player"?tank.bonusBsz:0);
  bullets.push({x:bx,y:by,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:finalBsz,dm:cr?dm*critMult:dm,pn:Math.max(1,pn||1),li:C.BL,oid,col:col||"#00b0db",cr});
  if(oid==="player"){mfT=C.MF;mfx=bx;mfy=by;sShoot();tank.vx-=Math.cos(a)*C.RECOIL;tank.vy-=Math.sin(a)*C.RECOIL}
  return true;
}
function fireM(x,y,br,ba,dm,sp,pn,rt,oid,ow,col,gs){
  if(bullets.length>=C.MAX_BULLETS)return false;
  const cd=bCD[oid]||0;if(cd>0)return false;
  let mr=999,rc=0;
  for(const b of br){
    const a=ba+b.a+(b.sd?rn(-b.sd,b.sd):0);
    const bd=dm*b.dm,bs=sp*b.sp,brt=rt*b.rl;
    if(brt<mr)mr=brt;
    if(bullets.length>=C.MAX_BULLETS)break;
    const or=(ow&&ow.r)||26;
    const bx=x+Math.cos(a)*(or+b.l*gs*0.4),by=y+Math.sin(a)*(or+b.l*gs*0.4);
    const critRate=oid==="player"?tank.eCrit:C.CRIT;
    const critMult=oid==="player"?tank.eCritM:C.CRITM;
    const cr=Math.random()<critRate;
    const bsz2=Math.max(3,b.w*gs*0.25)+(oid==="player"?tank.bonusBsz:0);
    bullets.push({x:bx,y:by,vx:Math.cos(a)*bs,vy:Math.sin(a)*bs,r:bsz2,dm:cr?bd*critMult:bd,pn:Math.max(1,pn||1),li:C.BL,oid,col:col||"#00b0db",cr});
    rc+=b.dm;
  }
  bCD[oid]=Math.max(2,mr);
  if(oid==="player"){
    mfT=C.MF;mfx=x+Math.cos(ba)*((ow&&ow.r)||26);mfy=y+Math.sin(ba)*((ow&&ow.r)||26);
    sShoot();
    const f=Math.min(rc*C.RECOIL*0.4,2.5);tank.vx-=Math.cos(ba)*f;tank.vy-=Math.sin(ba)*f;
  }
  return true;
}
function updB(){
  for(const k in bCD)if(bCD[k]>0)bCD[k]--;
  if(mfT>0)mfT--;
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;b.li--;
    if(b.li<=0||b.x<0||b.x>C.MW||b.y<0||b.y>C.MH)bullets.splice(i,1);
  }
}
function drwB(){
  const z=cam.z;
  for(const b of bullets){
    if(!cam.vis(b.x,b.y,12))continue;
    const sx=cam.SX(b.x),sy=cam.SY(b.y),sr=Math.max(2,b.r*z);
    ctx.fillStyle=b.cr?"#ffffaa":b.col;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,6.283);ctx.fill();
  }
}

  return null;
}

// ─── CARD GENERATION ────────────────────────────────────────────────────────
function genCards(){
  const allCards=Object.keys(C.CARDS);
  const chosen=[];const used=new Set();
  let attempts=0;
  while(chosen.length<3&&attempts<60){
    attempts++;
    const r=Math.random();
    let targetRar;
    if(r<C.CARD_ODDS.legendary)targetRar="legendary";
    else if(r<C.CARD_ODDS.legendary+C.CARD_ODDS.epic)targetRar="epic";
    else if(r<C.CARD_ODDS.legendary+C.CARD_ODDS.epic+C.CARD_ODDS.rare)targetRar="rare";
    else targetRar="common";
    const pool=allCards.filter(id=>{
      const cd=C.CARDS[id];
      const stk=tank.cards[id]||0;
      return cd.r===targetRar&&!used.has(id)&&stk<C.MAX_CARD_STACKS;
    });
    const fallback=allCards.filter(id=>!used.has(id)&&(tank.cards[id]||0)<C.MAX_CARD_STACKS);
    const src=pool.length?pool:fallback;
    if(!src.length)break;
    const pick=src[ri(0,src.length-1)];
    used.add(pick);chosen.push(pick);
  }
  return chosen;
}

function spawnBoss(ft){
  const tps=Object.keys(C.BT),tp=ft||tps[ri(0,tps.length-1)];
  const minDist=C.MW*0.62;
  for(let i=0;i<20;i++){
    const side=ri(0,3);
    let x,y;
    if(side===0){x=rn(200,C.MW*0.2);y=rn(200,C.MH-200);}
    else if(side===1){x=rn(C.MW*0.8,C.MW-200);y=rn(200,C.MH-200);}

    else{x=rn(200,C.MW-200);y=rn(C.MH*0.8,C.MH-200);}

function drwBoss(){
  const z=cam.z;
  for(const b of bosses){
    if(!b.al||!cam.vis(b.x,b.y,b.r+50))continue;
    const sx=cam.SX(b.x),sy=cam.SY(b.y),sr=Math.max(8,b.r*z);
    // Pulsing glow for phase 2
    if(b.phase===2){ctx.save();ctx.globalAlpha=0.15+0.1*Math.sin(Date.now()*0.01);ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(sx,sy,sr*1.4,0,6.283);ctx.fill();ctx.restore()}
    ctx.save();ctx.translate(sx,sy);ctx.rotate(b.angle);
    ctx.fillStyle="#777";rr(ctx,0,-sr*0.2,sr*1.3,sr*0.4,2);ctx.fill();
    ctx.restore();
    dC(ctx,sx,sy,sr,b.ft>0?"#fff":b.col,b.ol,Math.max(1,2.5*z));
    const bpcol=b.phase===2?"#ff4444":"#ff8844";
    dBar(ctx,sx,sy+sr+5*z,sr*2.2,Math.max(3,4.5*z),b.hp/b.mhp,bpcol);
    ctx.save();ctx.font=`bold ${Math.max(9,Math.round(10*z))}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=2;
    const bLabel=b.lb+(b.phase===2?" ☠":"")+(b.score>0?" ["+fsc(b.scV+b.score)+"]":"");
    ctx.strokeText(bLabel,sx,sy-sr-4*z);ctx.fillStyle=b.col;ctx.fillText(bLabel,sx,sy-sr-4*z);ctx.restore();
  }
}

const pops=[];let dSc=0,sFl=0;
// keyboard shortcuts handled by click events
function addPop(x,y,pts,col,cr){pops.push({x,y:y-18,tx:(cr?"CRIT +":"+")+fsc(pts),col:col||"#fff",big:cr,li:50,ml:50,vx:rn(-0.2,0.2)})}

function onSD(s,oid,cr){
  const pts=s.gS(),xp=s.xp*(cr?2:1);
  if(oid==="player"){
    tank.score+=pts;tank.addXP(xp);tank.recalc();sFl=6;
    addPop(s.x,s.y,pts,s.vr?C.RARES[s.vr].c:"#fff",cr);
  } else {
    // AI gets the score — makes them grow
    const owner=ais.find(a=>a.id===oid);
    if(owner)owner.score+=pts;
  }
  sBreak();
}
function onMD(m,oid,cr){const pts=m.gS(),xp=m.xp*(cr?2:1);if(oid==="player"){tank.score+=pts;tank.addXP(xp);tank.recalc();sFl=6;addPop(m.x,m.y,pts,"#fc4",true)}cam.shake(4);sBoss()}
function onAD(ai){
  totalKills++;
  // base kill reward + all the score the AI accumulated farming shapes
  const baseKill=500+ai.lv*100;
  const farmBonus=Math.floor(ai.score*1.5); // player gets 150% of what AI farmed
  const pts=baseKill+farmBonus;
  tank.score+=pts;tank.addXP(pts);tank.recalc();sFl=6;
  addPop(ai.x,ai.y,pts,farmBonus>500?"#fc4":ai.col,farmBonus>200);
  cam.shake(Math.min(2+ai.gs,5));sBreak();
  delete bCD[ai.id];
}
function onBD(bs){
  totalKills++;
  const timeBonus=bs.score||0; // score boss accumulated while alive
  const total=bs.scV+timeBonus;
  tank.score+=total;tank.addXP(bs.xpV+Math.floor(timeBonus*0.5));tank.recalc();sFl=6;
  addPop(bs.x,bs.y,total,"#f44",true);
  cam.shake(5);sBoss();
  delete bCD[bs.id];
}

// ─── MAIN UPDATE ────────────────────────────────────────────────────────────
function update(){
  if(isDead)return;
  if(tank.pendingCards&&tank.pendingCards.length)return; // paused while picking
  tick++;saveT++;
  tank.checkCardTrigger();
  if(saveT>1800){saveT=0;saveGame()}

  // Events
  if(curEvt){
    evtT--;if(evtT<=0){curEvt=null;nextEvt=ri(C.EMIN,C.EMAX)}
  }else{
    nextEvt--;
    if(nextEvt<=0){
      const ks=Object.keys(C.EVT),k=ks[ri(0,ks.length-1)];
      curEvt=k;evtT=C.EVT[k].dur;
      evtN=C.EVT[k].ic+" "+C.EVT[k].lb+": "+C.EVT[k].ds;evtNT=160;
      if(k==="bossrush"){for(let i=0;i<4;i++)spawnBoss();evtT=60}
    }
  }
  if(evtNT>0)evtNT--;if(bossWT>0)bossWT--;

  if(!tank.pendingTier)tank.update();
  if(md&&tank.hp>0&&!tank.pendingTier){
    const allBarrels=[...tank.cls.br,...tank.extraBarrels];
    fireM(tank.x,tank.y,allBarrels,tank.angle,tank.eDmg,tank.eSpd,tank.ePen,tank.eRl,"player",tank,"#00b0db",tank.gs);
    tank.fire();
  }

  updB();
  const isStm=curEvt==="storm",isRr=curEvt==="rare",isMeteor=curEvt==="meteor";
  updShapes(tick,false);

  // Remove dead shapes
  for(let i=shapes.length-1;i>=0;i--)if(!shapes[i].al)shapes.splice(i,1);

  const def=C.MS-shapes.length,rate=isStm?C.SSR*3:isMeteor?C.SSR*2:C.SSR;
  for(let i=0;i<Math.min(def,rate);i++)spawnS(tank.x,tank.y,isRr);

  // Mega shapes update
  for(let i=megaS.length-1;i>=0;i--){
    const m=megaS[i];
    if(!m.al){megaS.splice(i,1);continue}
    m.rot+=m.rv;m.vx*=0.97;m.vy*=0.97;m.x+=m.vx;m.y+=m.vy;
    m.x=cl(m.x,m.r,C.MW-m.r);m.y=cl(m.y,m.r,C.MH-m.r);
    if(m.ft>0)m.ft--;
  }

  megaT--;if(megaT<=0){megaT=ri(280,500);spawnMega()}

  updAI(tick);
  // FIX: clean up dead AIs properly — mark al=false THEN splice
  for(let i=ais.length-1;i>=0;i--){
    if(!ais[i].al){
      aiRT.push(C.AIRT);
      ais.splice(i,1);
    }
  }
  for(let i=aiRT.length-1;i>=0;i--){aiRT[i]--;if(aiRT[i]<=0){aiRT.splice(i,1);spawnAI()}}

  bossT--;if(bossT<=0){bossT=C.BINT;for(let i=0;i<18;i++)spawnBoss();}
  updBoss();
  for(let i=bosses.length-1;i>=0;i--)if(!bosses[i].al)bosses.splice(i,1);

  collide();
  cam.update(tank.x,tank.y,tank.fov);

  const d=tank.score-dSc;dSc+=Math.abs(d)<1?d:d*0.1;
  if(sFl>0)sFl--;

  for(let i=pops.length-1;i>=0;i--){pops[i].y-=1.3;pops[i].x+=pops[i].vx;pops[i].li--;if(pops[i].li<=0)pops.splice(i,1)}
  // card picks handled by click
}

// ─── COLLISION (squared distance — no sqrt, no particles) ──────────────────
function collide(){
  const toRemove=new Set();
  for(let i=0;i<bullets.length;i++){
    if(toRemove.has(i))continue;
    const b=bullets[i];
    const bx=b.x,by=b.y;
    let removed=false;

    // vs shapes
    for(let j=shapes.length-1;j>=0;j--){
      const s=shapes[j];if(!s.al)continue;
      const rad=b.r+s.r;
      if(dst2(bx,by,s.x,s.y)<rad*rad){
        s.hit(b.dm);s.kb(ag(bx,by,s.x,s.y),C.SKB);
        sHit();b.pn--;
        if(!s.al)onSD(s,b.oid,b.cr);
        if(b.pn<=0){toRemove.add(i);removed=true;break}
      }
    }
    if(removed)continue;

    // vs mega shapes
    for(let j=megaS.length-1;j>=0;j--){
      const m=megaS[j];if(!m.al)continue;
      const rad=b.r+m.r;
      if(dst2(bx,by,m.x,m.y)<rad*rad){
        m.hit(b.dm);m.kb(ag(bx,by,m.x,m.y),C.SKB*0.08);
        b.pn--;
        if(!m.al)onMD(m,b.oid,b.cr);
        if(b.pn<=0){toRemove.add(i);removed=true;break}
      }
    }
    if(removed)continue;

    // player bullets vs AI & bosses
    if(b.oid==="player"){
      for(let j=ais.length-1;j>=0;j--){
        const ai=ais[j];if(!ai.al)continue;
        const rad=b.r+ai.r;
        if(dst2(bx,by,ai.x,ai.y)<rad*rad){
          ai.hp-=b.dm;ai.ft=3;b.pn--;
          if(ai.hp<=0&&ai.al){ai.al=false;onAD(ai)}
          if(b.pn<=0){toRemove.add(i);removed=true;break}
        }
      }
      if(removed)continue;

      for(let j=bosses.length-1;j>=0;j--){
        const bs=bosses[j];if(!bs.al)continue;
        const rad=b.r+bs.r;
        if(dst2(bx,by,bs.x,bs.y)<rad*rad){
          bs.hp-=b.dm;bs.ft=3;b.pn--;
          if(bs.hp<=0&&bs.al){bs.al=false;onBD(bs)}
          if(b.pn<=0){toRemove.add(i);removed=true;break}
        }
      }
      if(removed)continue;
    }

    // enemy bullets vs player
    if(b.oid!=="player"){
      const rad=b.r+tank.r;
      if(dst2(bx,by,tank.x,tank.y)<rad*rad){
        tank.takeDmg(b.dm);
        toRemove.add(i);
      }
    }
  }

  // splice from highest index down — no index shift
  const idxs=[...toRemove].sort((a,b)=>b-a);
  for(const idx of idxs)bullets.splice(idx,1);

  // ── Body damage — player vs shapes (arras.io style) ──────────────────────
  if(tick%3===0){
    for(let j=shapes.length-1;j>=0;j--){
      const s=shapes[j];if(!s.al)continue;
      const rad=tank.r+s.r;
      if(dst2(tank.x,tank.y,s.x,s.y)<rad*rad){
        // shape hp scales damage it deals and takes
        const shapePow=C.SHAPES[s.tp].hp*TIER_HP[s.tier||0]*(s.vr?1.4:1);
        const tankPow=(C.THP+tank.bonusHp)*0.08;
        // player takes damage from shape body
        tank.takeDmg(shapePow*0.012);
        // shape takes damage from player body
        s.hp-=tankPow;s.ft=2;
        if(s.hp<=0&&s.al){s.al=false;onSD(s,"player",false)}
        // knock apart
        const a=ag(tank.x,tank.y,s.x,s.y);
        s.kb(a,1.5);
        tank.vx-=Math.cos(a)*0.4;tank.vy-=Math.sin(a)*0.4;
        if(isDead)return;
      }
    }
    for(let j=megaS.length-1;j>=0;j--){
      const m=megaS[j];if(!m.al)continue;
      const rad=tank.r+m.r;
      if(dst2(tank.x,tank.y,m.x,m.y)<rad*rad){
        tank.takeDmg(m.mhp*0.004);
        m.hp-=(C.THP+tank.bonusHp)*0.05;m.ft=2;
        if(m.hp<=0&&m.al){m.al=false;onMD(m,"player",false)}
        if(isDead)return;
      }
    }
  }
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  ctx.fillStyle=C.BG;ctx.fillRect(0,0,W,H);
  const z=cam.z;

  // Biome tints
  for(const k in C.BIOMES){
    const b=C.BIOMES[k];
    if(cam.vis(b.x+b.w/2,b.y+b.h/2,Math.max(b.w,b.h)/2)){
      ctx.fillStyle=b.tint;ctx.fillRect(cam.SX(b.x),cam.SY(b.y),Math.round(b.w*z),Math.round(b.h*z));
      // Biome label at center
      ctx.save();ctx.globalAlpha=0.12;ctx.font=`bold ${Math.max(10,Math.round(18*z))}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.fillStyle="#fff";ctx.fillText(b.label,cam.SX(b.x+b.w/2),cam.SY(b.y+b.h/2));ctx.restore();
    }
  }

  // Grid
  if(z>0.2){
    ctx.strokeStyle="rgba(0,0,0,0.03)";ctx.lineWidth=1;ctx.beginPath();
    const gs=C.GS;
    for(let x=Math.floor(cam.x/gs)*gs;x<cam.x+W/z+gs;x+=gs){const sx=cam.SX(x);ctx.moveTo(sx,0);ctx.lineTo(sx,H)}
    for(let y=Math.floor(cam.y/gs)*gs;y<cam.y+H/z+gs;y+=gs){const sy=cam.SY(y);ctx.moveTo(0,sy);ctx.lineTo(W,sy)}
    ctx.stroke();
  }

  // Border
  ctx.strokeStyle="rgba(200,60,60,0.3)";ctx.lineWidth=3;
  ctx.strokeRect(cam.SX(0),cam.SY(0),Math.round(C.MW*z),Math.round(C.MH*z));

  drwShapes();

  // Mega shapes draw
  for(const m of megaS){
    if(!m.al||!cam.vis(m.x,m.y,m.r+35))continue;
    const sx=cam.SX(m.x),sy=cam.SY(m.y),sr=Math.max(5,m.r*z);
    dP(ctx,sx,sy,sr,m.si,m.rot,m.ft>0?"#fff":m.c,m.o,Math.max(1,2.5*z));
    dBar(ctx,sx,sy+sr+4*z,sr*1.8,Math.max(3,3.5*z),m.hp/m.mhp,"#fc4");
    ctx.save();ctx.font=`bold ${Math.max(7,Math.round(9*z))}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.fillStyle="#fc4";ctx.fillText(m.lb,sx,sy-sr-4*z);ctx.restore();
  }

  drwAI();drwBoss();drwB();
  if(!isDead)tank.draw();

  // Floating score pops
  for(const p of pops){
    const a=cl(p.li/p.ml,0,1);if(a<=0)continue;
    ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${p.big?14:11}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.strokeStyle="rgba(0,0,0,0.4)";ctx.lineWidth=2.5;ctx.strokeText(p.tx,cam.SX(p.x),cam.SY(p.y));ctx.fillStyle=p.col;ctx.fillText(p.tx,cam.SX(p.x),cam.SY(p.y));ctx.restore();
  }

  drawHUD();drawMM();
  if(tank.pendingCards)drawCardPicker();
  else if(tank.pendingTier)drawCP();
}

// ─── CARD PICKER UI ──────────────────────────────────────────────────────────
const CARD_W=195,CARD_H=150,CARD_GAP=16;
function rCol(r){return r==="legendary"?"#ffd700":r==="epic"?"#cc44ff":r==="rare"?"#4af":"#bbb"}
function rBg(r){return r==="legendary"?"rgba(70,50,0,0.96)":r==="epic"?"rgba(50,0,80,0.96)":r==="rare"?"rgba(0,35,75,0.96)":"rgba(25,25,38,0.96)"}
function drawCardPicker(){
  if(!tank.pendingCards||!tank.pendingCards.length)return;
  const cards=tank.pendingCards;
  const totalW=cards.length*CARD_W+(cards.length-1)*CARD_GAP;
  const sx=W/2-totalW/2,sy=H/2-CARD_H/2-30;
  ctx.fillStyle="rgba(0,0,0,0.72)";ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.font="bold 18px 'Exo 2',sans-serif";ctx.textAlign="center";
  ctx.fillStyle="#fff";ctx.fillText("⬆ LEVEL "+tank.lv+" — Choose a Card",W/2,sy-22);
  ctx.font="10px 'Exo 2',sans-serif";ctx.fillStyle="rgba(255,255,255,0.4)";
  ctx.fillText("Cards: "+tank.cardsTaken+" | Next at "+fsc(tank.nextCardScore)+" score",W/2,sy-7);
  ctx.restore();
  // timer bar
  const tr=cl(tank.cardTimer/(C.CARD_TIMER*60),0,1);
  ctx.fillStyle="rgba(255,255,255,0.1)";ctx.fillRect(sx,sy-13,totalW,4);
  ctx.fillStyle=tr>0.5?"#4e4":tr>0.25?"#ee4":"#e44";ctx.fillRect(sx,sy-13,totalW*tr,4);
  for(let i=0;i<cards.length;i++){
    const id=cards[i];const cd=C.CARDS[id];
    const stk=tank.cards[id]||0;
    const cx2=sx+i*(CARD_W+CARD_GAP);
    const rc=rCol(cd.r),rb=rBg(cd.r);
    const maxed=false; // no stack limit
    const hov=mx>=cx2&&mx<=cx2+CARD_W&&my>=sy&&my<=sy+CARD_H;
    ctx.save();
    if(hov&&!maxed){ctx.shadowColor=rc;ctx.shadowBlur=20}
    ctx.fillStyle=rb;rr(ctx,cx2,sy,CARD_W,CARD_H,10);ctx.fill();
    ctx.strokeStyle=maxed?"#f44":rc;ctx.lineWidth=hov&&!maxed?2.5:1.5;
    rr(ctx,cx2,sy,CARD_W,CARD_H,10);ctx.stroke();
    ctx.shadowBlur=0;
    if(cd.risk){ctx.fillStyle="#f55";ctx.font="bold 7px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillText("⚠ RISK",cx2+8,sy+13);}
    ctx.font="bold 8px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle=rc;
    ctx.fillText(cd.r.toUpperCase(),cx2+CARD_W/2,sy+13);
    ctx.font="24px serif";ctx.fillText(cd.ic,cx2+CARD_W/2,sy+40);
    ctx.fillStyle="#fff";ctx.font="bold 12px 'Exo 2',sans-serif";ctx.fillText(cd.n,cx2+CARD_W/2,sy+57);
    // show stack count badge
    if(stk>0){ctx.fillStyle=rc;ctx.font="bold 9px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillText("×"+stk+" stacked",cx2+CARD_W/2,sy+68);}
    {
      const descIdx=Math.min(stk,cd.desc.length-1);
      const lines=(cd.desc[descIdx]||cd.desc[cd.desc.length-1]).split(" / ");
      for(let l=0;l<lines.length;l++){
        ctx.fillStyle=l===0?"rgba(255,255,255,0.85)":"#f88";
        ctx.font=(l===0?"8.5px":"8px")+" 'Exo 2',sans-serif";
        ctx.fillText(lines[l],cx2+CARD_W/2,sy+80+l*14);
      }
    }
    ctx.restore();
  }
  ctx.save();ctx.font="9px 'Exo 2',sans-serif";ctx.textAlign="center";
  ctx.fillStyle="rgba(255,255,255,0.25)";
  ctx.fillText("Click to pick  •  "+Math.ceil(tank.cardTimer/60)+"s remaining",W/2,sy+CARD_H+18);
  ctx.restore();
}

// ─── CLASS PICKER ────────────────────────────────────────────────────────────
function drawCP(){
  const tier=tank.pendingTier,opts=C.CT[tier];if(!opts)return;
  const pw2=300,ph=opts.length*34+56,px=W/2-pw2/2,py=H/2-ph/2;
  ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,W,H);
  ctx.save();ctx.fillStyle="rgba(5,5,20,0.96)";rr(ctx,px,py,pw2,ph,12);ctx.fill();
  ctx.strokeStyle="rgba(255,200,50,0.55)";ctx.lineWidth=2;rr(ctx,px,py,pw2,ph,12);ctx.stroke();
  ctx.font="bold 14px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle="#fc4";
  ctx.fillText("LEVEL "+tier+"! Choose Class:",W/2,py+22);
  let yy=py+38;
  for(const k of opts){
    const tc=C.CL[k];if(!tc)continue;
    const hov=mx>=px+6&&mx<=px+pw2-6&&my>=yy-6&&my<=yy+22;
    ctx.fillStyle=hov?"rgba(255,255,255,0.13)":"rgba(255,255,255,0.06)";
    rr(ctx,px+6,yy-6,pw2-12,28,5);ctx.fill();
    ctx.font="bold 11px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#3df";ctx.fillText(tc.lb,px+14,yy+8);
    ctx.font="400 8px 'Exo 2',sans-serif";ctx.textAlign="right";ctx.fillStyle="#999";ctx.fillText(tc.ds,px+pw2-14,yy+8);
    yy+=34;
  }
  ctx.restore();
}

// ─── UNIFIED CLICK HANDLER ───────────────────────────────────────────────────
cvs.addEventListener("click",e=>{
  // card picker click
  if(tank.pendingCards&&tank.pendingCards.length){
    const cards=tank.pendingCards;
    const totalW=cards.length*CARD_W+(cards.length-1)*CARD_GAP;
    const sx=W/2-totalW/2,sy=H/2-CARD_H/2-24;
    for(let i=0;i<cards.length;i++){
      const cx2=sx+i*(CARD_W+CARD_GAP);
      if(e.clientX>=cx2&&e.clientX<=cx2+CARD_W&&e.clientY>=sy&&e.clientY<=sy+CARD_H){
        const id=cards[i];
        if((tank.cards[id]||0)<C.MAX_CARD_STACKS)tank.pickCard(id);
        return;
      }
    }
    return;
  }
  // class picker click
  if(tank.pendingTier){
    const opts=C.CT[tank.pendingTier];if(!opts)return;
    const pw2=300,ph=opts.length*34+56,py=H/2-ph/2;
    let yy=py+38;
    for(const k of opts){if(e.clientY>=yy-6&&e.clientY<yy+28){tank.setClass(k);return}yy+=34}
  }
});
window.addEventListener("keydown",e=>{
  if(e.key==="Escape"){if(tank.pendingCards)tank.pendingCards=null;if(tank.pendingTier)tank.pendingTier=null;}
});

// ─── MINIMAP ────────────────────────────────────────────────────────────────
let mmRA=0;
function drawMM(){
  mmRA+=0.01;
  const mm=C.MMS,ox=W-mm-6,oy=H-mm-6,sx=mm/C.MW,sy=mm/C.MH;
  ctx.save();ctx.fillStyle="rgba(25,25,38,0.7)";rr(ctx,ox-3,oy-3,mm+6,mm+6,6);ctx.fill();
  ctx.beginPath();rr(ctx,ox,oy,mm,mm,4);ctx.clip();
  ctx.fillStyle="rgba(165,160,150,0.2)";ctx.fillRect(ox,oy,mm,mm);
  for(const k in C.BIOMES){const b=C.BIOMES[k];ctx.fillStyle=b.tint.replace(/[\d.]+\)$/,"0.2)");ctx.fillRect(ox+b.x*sx,oy+b.y*sy,b.w*sx,b.h*sy)}
  for(const b of bosses){if(!b.al)continue;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(ox+b.x*sx,oy+b.y*sy,3.5,0,6.283);ctx.fill()}
  for(const ai of ais){if(!ai.al)continue;ctx.fillStyle=ai.col;ctx.fillRect(ox+ai.x*sx-0.8,oy+ai.y*sy-0.8,1.6,1.6)}
  if(!isDead){
    const ppx=ox+tank.x*sx,ppy=oy+tank.y*sy;
    // FOV circle on minimap
    ctx.globalAlpha=0.15;ctx.fillStyle="#0bd";ctx.beginPath();ctx.arc(ppx,ppy,tank.fov*mm*0.06,0,6.283);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle="#0bd";ctx.beginPath();ctx.arc(ppx,ppy,2.8,0,6.283);ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=0.8;ctx.stroke();
  }
  // Minimap border label
  ctx.font="bold 6px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillText("MAP",ox+mm/2,oy-4);
  ctx.restore();
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
function loop(){update();render();requestAnimationFrame(loop)}
cam.x=tank.x-W/2;cam.y=tank.y-H/2;
loop();
</script></body></html>
