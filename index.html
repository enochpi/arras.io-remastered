// ── CANVAS / RESIZE ─────────────────────────────────────────
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
let W=0,H=0;
function resize(){cvs.width=W=window.innerWidth;cvs.height=H=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── UTILS ───────────────────────────────────────────────────
const PI2=Math.PI*2;
function rn(a,b){return Math.random()*(b-a)+a}
function ri(a,b){return Math.floor(rn(a,b+1))}
function cl(v,a,b){return v<a?a:v>b?b:v}
function lr(a,b,t){return a+(b-a)*t}
function dst2(ax,ay,bx,by){const dx=bx-ax,dy=by-ay;return dx*dx+dy*dy}
function dst(ax,ay,bx,by){return Math.sqrt(dst2(ax,ay,bx,by))}
function ang(ax,ay,bx,by){return Math.atan2(by-ay,bx-ax)}
function fsc(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return''+Math.floor(n)}
function rr(x,y,w,h,r){r=Math.min(r||0,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function poly(x,y,r,n,rot){ctx.beginPath();for(let i=0;i<n;i++){const a=rot+PI2*i/n;i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();}
function safeLinear(x0,y0,x1,y1){if(!isFinite(x0+y0+x1+y1)||(x0===x1&&y0===y1))return null;try{return ctx.createLinearGradient(x0,y0,x1,y1);}catch(e){return null;}}

// ── AUDIO ───────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v,t){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v*.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const SFX={shoot:()=>beep(900,.03,.12,'square'),hit:()=>beep(220,.04,.08,'sawtooth'),die:()=>beep(80,.3,.15,'sawtooth'),lvl:()=>{beep(500,.05,.1,'sine');setTimeout(()=>beep(900,.06,.1,'sine'),60)},card:()=>{beep(600,.04,.1,'sine');setTimeout(()=>beep(800,.05,.1,'sine'),50);setTimeout(()=>beep(1100,.08,.1,'sine'),110)},wave:()=>beep(200,.4,.18,'sawtooth')};

// ── MAP / CAMERA ─────────────────────────────────────────────
const MAP={W:4800,H:1188};
const cam={x:0,y:0,z:1,shake:0,
  update(tx,ty){
    this.z=1.1;
    const vw=W/this.z,vh=H/this.z;
    this.x=lr(this.x,tx-vw/2,.1);this.y=lr(this.y,ty-vh/2,.1);
    this.x=cl(this.x,0,MAP.W-vw);this.y=cl(this.y,0,MAP.H-vh);
  },
  sx(wx){return(wx-this.x)*this.z+(this.shake?(Math.random()-.5)*this.shake:0)},
  sy(wy){return(wy-this.y)*this.z+(this.shake?(Math.random()-.5)*this.shake:0)},
  wx(sx){return sx/this.z+this.x},wy(sy){return sy/this.z+this.y},
  vis(wx,wy,m){m=m||60;return wx>this.x-m&&wx<this.x+W/this.z+m&&wy>this.y-m&&wy<this.y+H/this.z+m}
};

// ── WALLS ────────────────────────────────────────────────────
const walls=[]; // no walls — open arena
function wallBlock(obj){
  for(const w of walls){
    const nx=cl(obj.x,w.x,w.x+w.w),ny=cl(obj.y,w.y,w.y+w.h);
    const dx=obj.x-nx,dy=obj.y-ny,d=Math.sqrt(dx*dx+dy*dy);
    if(d<obj.r&&d>0){const pen=(obj.r-d)/d;obj.x+=dx*pen;obj.y+=dy*pen;
      if(obj.vx!==undefined){const dot=obj.vx*dx/d+obj.vy*dy/d;obj.vx-=dot*(dx/d)*1.4;obj.vy-=dot*(dy/d)*1.4;}}
  }
}
function wallBlockBullet(b){
  for(const w of walls){
    const nx=cl(b.x,w.x,w.x+w.w),ny=cl(b.y,w.y,w.y+w.h);
    if(dst2(b.x,b.y,nx,ny)<(b.r+2)*(b.r+2))return true;
  }
  return false;
}

// ── PARTICLES ────────────────────────────────────────────────
const parts=[];
function spark(x,y,col,n,spd,life){
  n=Math.min(n,20);
  for(let i=0;i<n;i++){const a=rn(0,PI2),s=rn(spd*.3,spd);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life,ml:life,r:rn(1.5,4)});}
}
function updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.87;p.vy*=.87;if(--p.life<=0)parts.splice(i,1);}}
function drwParts(){const z=cam.z;for(const p of parts){if(!cam.vis(p.x,p.y,8))continue;ctx.globalAlpha=p.life/p.ml*.75;ctx.fillStyle=p.col;const sr=Math.max(1,p.r*z);ctx.fillRect(cam.sx(p.x)-sr/2,cam.sy(p.y)-sr/2,sr,sr);}ctx.globalAlpha=1;}

const P={
  x:MAP.W/2,y:MAP.H/2,r:26,vx:0,vy:0,angle:0,
  hp:150,mhp:150,reg:4,
  lv:1,xp:0,xpN:100,score:0,kills:0,
  cls:'basic',fireCd:0,
  pts:0,
  stats:{hp:0,reg:0,spd:0,dmg:0,fire:0,bspd:0,pen:0,crit:0,armor:0,lifesteal:0,range:0,multishot:0,bulSize:0,xpGain:0,lucky:0,explodeR:0,recoil:0,scatter:0},
  bonus:{hp:0,reg:0,spd:0,dmg:0,fire:0,bspd:0,pen:0,crit:0,flatHp:0},
  get tc(){return TANK_CLASSES[this.cls]},
  get eMv(){return(5.5+(this.bonus.spd*.4))*this.tc.sm*(1+this.stats.spd*.10)},
  get eDmg(){return(18+this.lv*1.2)*(1+this.bonus.dmg*.25)*this.tc.hm*(1+this.stats.dmg*.10)},
  get eRl(){return Math.max(.05,(8-this.bonus.fire*.5)*this.tc.fm*.1/(1+this.stats.fire*.10))},
  get eBspd(){return(8+this.bonus.bspd*.5)*(this.tc.sm||1)*(1+this.stats.bspd*.10)},
  get ePen(){return 1+this.bonus.pen+Math.floor(this.stats.pen*.5)},
  get eCrit(){return .05+this.bonus.crit*.05+this.stats.crit*.008},
  get emhp(){return(150*(1+this.stats.hp*.18)+this.bonus.flatHp)*(TANK_CLASSES[this.cls].hm||1)},
  get eReg(){return(5+this.bonus.reg*.9)*(1+this.stats.reg*.14)},
  get eArmor(){return Math.min(.75,this.stats.armor*.008)},
  get eRegen2(){return this.stats.lifesteal*.005},
  get eBulSize(){return 1+this.stats.bulSize*.008},
  get eXpMul(){return 1+this.stats.xpGain*.01},
  addXP(v){
    this.xp+=v*this.eXpMul;
    while(this.xp>=this.xpN){
      this.xp-=this.xpN;this.lv++;
      this.xpN=Math.floor(80*Math.pow(1.12,this.lv));
      this.mhp=this.emhp;this.hp=Math.min(this.hp+this.mhp*.3,this.mhp);
      this.pts+=2;
      SFX.lvl();announce('Level '+this.lv+'! +2 upgrade pts','#ffcc44');
      spawnLevelPickups(this.lv);checkClassUnlocks(this.lv);
    }
  },
  update(){
    const wx=cam.wx(mx),wy=cam.wy(my);
    this.angle=Math.atan2(wy-this.y,wx-this.x);
    let ax=0,ay=0;
    if(keys.w||keys.ArrowUp)ay-=1;if(keys.s||keys.ArrowDown)ay+=1;
    if(keys.a||keys.ArrowLeft)ax-=1;if(keys.d||keys.ArrowRight)ax+=1;
    if(ax&&ay){ax*=.707;ay*=.707;}
    const spd=this.eMv;
    this.vx=(this.vx+ax*.8*spd)*.88;this.vy=(this.vy+ay*.8*spd)*.88;
    const mv=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(mv>spd){this.vx=this.vx/mv*spd;this.vy=this.vy/mv*spd;}
    this.x+=this.vx;this.y+=this.vy;
    this.x=cl(this.x,this.r,MAP.W-this.r);this.y=cl(this.y,this.r,MAP.H-this.r);
    wallBlock(this);
    if(this.hp<this.mhp)this.hp=Math.min(this.mhp,this.hp+this.eReg*.016);
    if(this.fireCd>0)this.fireCd-=1/60;
    cam.update(this.x,this.y);
    if(cam.shake>0)cam.shake*=.85;
    if((mouseDown||autoFire)&&this.fireCd<=0&&!showCards&&!showUpgrades&&!showClassPicker){
      this.tryFire();
    }
  },
  tryFire(){
    const br=this.tc.barrels;let fired=false;
    // FIX: multishot — every 20 pts adds an extra parallel bullet
    const extraShots=Math.floor(this.stats.multishot/20);
    for(const b of br){
      const scatterExtra=this.stats.scatter*.005;
      const baseAngles=[this.angle+b.a+(b.sd?rn(-b.sd,b.sd):0)+(scatterExtra?rn(-scatterExtra,scatterExtra):0)];
      // Extra shots spread in small arcs around main angle
      for(let e2=1;e2<=extraShots;e2++){
        baseAngles.push(this.angle+b.a+(b.sd?rn(-b.sd,b.sd):0)+e2*.08);
        baseAngles.push(this.angle+b.a+(b.sd?rn(-b.sd,b.sd):0)-e2*.08);
      }
      for(const a of baseAngles){
        const cr=Math.random()<this.eCrit;
        const bsz=Math.max(3,b.w*.25*P.eBulSize);
        const rangeMult=1+P.stats.range*.10;
        const bx=this.x+Math.cos(a)*(this.r+b.l*.35);
        const by=this.y+Math.sin(a)*(this.r+b.l*.35);
        bullets.push({x:bx,y:by,vx:Math.cos(a)*this.eBspd*b.sp,vy:Math.sin(a)*this.eBspd*b.sp,
          r:bsz,dm:this.eDmg*b.dm*(cr?2.2:1),pen:this.ePen,owner:'p',col:cr?'#ffe566':'#00ccff',cr,li:Math.round(280*rangeMult)});
        const recoilBoost=.5+this.stats.recoil*.004;
        this.vx-=Math.cos(a)*recoilBoost;this.vy-=Math.sin(a)*recoilBoost;
      }
      fired=true;
    }
    if(fired){this.fireCd=this.eRl;SFX.shoot();}
  },
  takeDmg(d){
    const reduced=d*(1-P.eArmor);
    this.hp-=reduced;spark(this.x,this.y,'#ff4444',6,3,20);flash('rgba(255,0,0,.15)',.4);
    if(this.hp<=0){this.hp=0;onPlayerDie();}
  },
  draw(){
    const z=cam.z,sx=cam.sx(this.x),sy=cam.sy(this.y),sr=Math.max(4,this.r*z);
    const cls=this.tc,col=classColor(this.cls),now=Date.now();
    // Glow
    ctx.save();ctx.globalAlpha=.15+.05*Math.sin(now*.003);ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx,sy,sr*1.6,0,PI2);ctx.fill();ctx.restore();
    // Barrels
    ctx.save();ctx.translate(sx,sy);ctx.rotate(this.angle);
    for(const b of cls.barrels){
      ctx.save();ctx.rotate(b.a);
      const bw=Math.max(3,b.w*z),bl=Math.max(6,b.l*z);
      ctx.fillStyle='#888';ctx.fillRect(0,-bw/2,bl,bw);
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.strokeRect(0,-bw/2,bl,bw);
      ctx.restore();
    }
    ctx.restore();
    // Body
    ctx.beginPath();ctx.arc(sx,sy,sr,0,PI2);ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.stroke();
    // HP ring
    const hpr=cl(this.hp/this.mhp,0,1);
    ctx.save();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=Math.max(2,3*z);ctx.beginPath();ctx.arc(sx,sy,sr+3*z,0,PI2);ctx.stroke();
    ctx.strokeStyle=hpr>.6?'#33ee55':hpr>.3?'#ffcc00':'#ff3300';ctx.lineWidth=Math.max(2,3*z);ctx.beginPath();ctx.arc(sx,sy,sr+3*z,-Math.PI/2,-Math.PI/2+PI2*hpr);ctx.stroke();
    ctx.restore();
    // Level text
    if(z>.3){ctx.font=`bold ${Math.round(8*z)}px 'Exo 2'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=2.5;ctx.strokeText('Lv'+this.lv,sx,sy);ctx.fillText('Lv'+this.lv,sx,sy);}
  }
};

function updBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.li--;
    if(b.li<=0||b.x<0||b.x>MAP.W||b.y<0||b.y>MAP.H||wallBlockBullet(b)){

const PREFIXES=['Proto','Apex','Nova','Cipher','Iron','Spectral','Vanta','Lumen','Aero','Volt','Prism','Cinder'];
const SUFFIXES=['Frame','Walker','Crusher','Array','Drift','Core','Reaver','Warden','Specter','Pylon','Bastion','Harrier'];

function isBossType(type){return type.startsWith('boss:')}
function getUnlockedVariantCount(wave){return Math.max(1,Math.floor((wave-1)/3)+1)}

function scaleBarrels(barrels,sizeMul,lenMul){
  return barrels.map(b=>({a:b.a,w:b.w*sizeMul,l:b.l*lenMul}));
}

function makeVariantSpec(idx,boss){
  const base=ATTACK_ARCHETYPES[idx%ATTACK_ARCHETYPES.length];
  const theme=CHASSIS_THEMES[Math.floor(idx/ATTACK_ARCHETYPES.length)%CHASSIS_THEMES.length];
  const tech=Math.floor(idx/ATTACK_ARCHETYPES.length);
  const hybrid=ATTACK_ARCHETYPES[(idx+tech+2)%ATTACK_ARCHETYPES.length];
  const advanced=tech>0;
  const shape=advanced&&tech%2?hybrid.shape:base.shape;
  const role=advanced?theme.name+' '+base.role:base.role;
  const hp=50*Math.pow(1.26,idx)*base.hp*(1+tech*.12)*(boss?11+tech*1.4:1);
  const dm=12*Math.pow(1.18,idx)*base.dm*(boss?2.5+tech*.25:1);
  const spd=Math.max(.85,4.3*Math.pow(.985,idx))*base.spd*(boss?1.04:1);
  const bspd=5.8*(1+Math.min(tech,6)*.05)*base.bspd;
  const frate=Math.max(.4,1.25*base.frate*(boss?.88:.98));
  const radius=18*(1+idx*.04)*base.r*(boss?2.4:1);
  const barrels=scaleBarrels(base.barrels,boss?1.45:1,boss?1.4+tech*.04:1+tech*.03);
  if(advanced&&barrels.length<4&&idx%3===0)barrels.push(...scaleBarrels(hybrid.barrels.slice(0,Math.min(2,hybrid.barrels.length)),boss?1.1:.92,boss?1.15:1));
  const config={
    lb:(advanced?PREFIXES[idx%PREFIXES.length]+' ':'')+role+(advanced?' '+SUFFIXES[(idx+tech)%SUFFIXES.length]:''),
    col:theme.col,body:theme.body,accent:theme.accent,aura:theme.accent,
    hp,dm,spd,bspd,frate,r:radius,pat:advanced&&idx%5===0?hybrid.pat:base.pat,
    xp:Math.round(hp*.12),sc:Math.round(hp*2.6),boss:!!boss,
    shape,barrels,behavior:advanced&&idx%4===0?hybrid.behavior:base.behavior,
    tech:tech+(boss?2:0),ornaments:2+tech+(boss?2:0),shieldMax:0,
  };
  if(base.role==='Sentinel'||(advanced&&idx%6===0))config.shieldMax=config.hp*(boss?.35:.18);
  if(advanced&&idx%7===0)config.pat='ring';
  if(advanced&&idx%9===0)config.behavior='support';
  return config;
}

function makeBossSpec(wave){
  const unlocked=getUnlockedVariantCount(wave);
  const primary=makeVariantSpec(unlocked-1,true);
  const support=makeVariantSpec(Math.max(0,unlocked-1-(wave%Math.min(unlocked,3)||0)),false);
  const phase=Math.floor((wave-1)/9);
  const earlyEase=wave<=10?lr(.5,1,wave/10):1;
  primary.lb=(['Alpha','Warlord','Overseer','Titan','Mythic','Abyssal','Doom','Eternal','Chaos','Sovereign','Nemesis','Void Lord'][phase%12]||'Prime')+' '+primary.lb;
  primary.hp*=earlyEase*(1+wave*.16);
  primary.mhp=primary.hp;
  primary.dm*=earlyEase*(1+wave*.075);
  primary.spd*=lr(.82,1,wave/10)*(1+Math.min(.35,wave*.008));
  primary.bspd*=lr(.84,1,wave/10)*(1+Math.min(.3,wave*.006));
  primary.frate=Math.max(.42,primary.frate*lr(1.45,1,wave/10)*(1-wave*.006));
  primary.sc=Math.round(primary.sc*(6+wave*.5));
  primary.xp=Math.round(primary.xp*(5+wave*.4));
  primary.boss=true;
  primary.tech+=2+phase;
  primary.ornaments+=2+phase;
  primary.barrels=primary.barrels.concat(scaleBarrels(support.barrels.slice(0,Math.min(2,support.barrels.length)),1.1,1.15));
  primary.shieldMax+=(wave>=5?primary.hp*.22:0);
  primary.summonEvery=wave>=8?Math.max(2.5,6.5-wave*.04):0;
  primary.novaEvery=wave>=14?Math.max(3.5,7.5-wave*.05):0;
  primary.phaseThreshold=wave>=10?.55:0;
  primary.spawnType='tank:'+Math.max(0,unlocked-1);
  primary.behavior=phase>=3?'orbit':primary.behavior;
  primary.pat=phase>=4&&wave%2?support.pat:primary.pat;
  return primary;
}

function getEnemySpec(type){
  if(isBossType(type))return makeBossSpec(Number(type.split(':')[1]));
  return makeVariantSpec(Number(type.split(':')[1]),false);
}

function spawnEnemy(type,x,y){
  const t=getEnemySpec(type);if(!t)return;
  const wave=waveState.wave;
  const minionScale=1+wave*.075;
  const scale=t.boss?1:minionScale;
  enemies.push({
    x:x||rn(80,MAP.W-80),y:y||rn(80,MAP.H-80),
    r:t.r,type,lb:t.lb,col:t.col,body:t.body,accent:t.accent,aura:t.aura,
    boss:t.boss||false,shape:t.shape,barrels:t.barrels,behavior:t.behavior,tech:t.tech,ornaments:t.ornaments,
    hp:t.hp*scale,mhp:t.hp*scale,
    dm:t.dm*(1+wave*.04),
    spd:t.spd,bspd:t.bspd,frate:Math.max(.22,t.frate*(t.boss?1:Math.max(.7,1-wave*.003))),
    pat:t.pat,xp:t.xp,sc:t.sc,
    vx:0,vy:0,angle:0,fcd:rn(0,t.frate),ft:0,
    _burst:0,_contactCd:0,_phaseDone:false,_nova:t.novaEvery||0,_summon:t.summonEvery||0,
    summonEvery:t.summonEvery||0,novaEvery:t.novaEvery||0,phaseThreshold:t.phaseThreshold||0,spawnType:t.spawnType||'',
    shieldMax:(t.shieldMax||0)*scale,shield:(t.shieldMax||0)*scale
  });
}

function spawnFarFrom(type){
  const minD=300;
  for(let i=0;i<20;i++){
    const x=rn(80,MAP.W-80),y=rn(150,MAP.H-150);
    if(dst2(x,y,P.x,P.y)>minD*minD){spawnEnemy(type,x,y);return;}
  }
  spawnEnemy(type);
}

// Spawn on the left edge within a MAP.H/2 tall square zone
function spawnFromLeft(type){
  const sqSize=Math.min(MAP.W,MAP.H)/2; // 2000
  const x=rn(50,180);
  const y=rn(MAP.H/2-sqSize/2,MAP.H/2+sqSize/2);
  spawnEnemy(type,x,y);
}

function updEnemies(){
  for(const e of enemies){
    if(e.fcd>0)e.fcd-=1/60;
    if(e.shieldMax>0&&e.shield<e.shieldMax)e.shield=Math.min(e.shieldMax,e.shield+e.shieldMax*.0018);
    const a=ang(e.x,e.y,P.x,P.y),d=dst(e.x,e.y,P.x,P.y);
    let stop=e.boss?230:165;
    if(e.behavior==='aggressive')stop*=.72;
    else if(e.behavior==='defensive')stop*=1.25;
    else if(e.behavior==='siege')stop*=1.45;
    else if(e.behavior==='support')stop*=1.55;
    const side=e.behavior==='flank'||e.behavior==='orbit'?((e.x+e.y)&1?1:-1):0;
    if(d>stop){e.vx+=Math.cos(a)*.35;e.vy+=Math.sin(a)*.35;}
    else if(d<stop*.6){e.vx-=Math.cos(a)*.22;e.vy-=Math.sin(a)*.22;}
    if(side){e.vx+=Math.cos(a+Math.PI/2*side)*.18;e.vy+=Math.sin(a+Math.PI/2*side)*.18;}
    e.vx*=.9;e.vy*=.9;
    const mv=Math.sqrt(e.vx*e.vx+e.vy*e.vy);
    if(mv>e.spd){e.vx=e.vx/mv*e.spd;e.vy=e.vy/mv*e.spd;}
    e.x+=e.vx;e.y+=e.vy;
    e.x=cl(e.x,e.r,MAP.W-e.r);e.y=cl(e.y,e.r,MAP.H-e.r);
    wallBlock(e);
    e.angle=ang(e.x,e.y,P.x,P.y);
    if(e.ft>0)e.ft--;
    PATTERNS[e.pat](e);
    if(e.boss){
      if(e.summonEvery){
        e._summon-=1/60;
        if(e._summon<=0){
          e._summon=e.summonEvery;
          for(let s=0;s<Math.min(4,1+Math.floor(waveState.wave/18));s++){
            const sa=rn(0,PI2),sd=e.r+rn(40,90);
            spawnEnemy(e.spawnType,e.x+Math.cos(sa)*sd,e.y+Math.sin(sa)*sd);
          }
          announce(e.lb,'#ff9966','Deploying escorts');
        }
      }
      if(e.novaEvery){
        e._nova-=1/60;
        if(e._nova<=0){
          e._nova=e.novaEvery;
          const n=10+Math.min(12,Math.floor(waveState.wave/6));
          for(let i=0;i<n;i++){
            const ba=i*PI2/n;
            bullets.push({x:e.x+Math.cos(ba)*(e.r+6),y:e.y+Math.sin(ba)*(e.r+6),vx:Math.cos(ba)*(e.bspd*.95),vy:Math.sin(ba)*(e.bspd*.95),r:6,dm:e.dm*.55,pen:1,owner:'e',col:e.accent,li:170});
          }
          flash('rgba(255,120,60,.08)',.2);
        }
      }
      if(e.phaseThreshold&&!e._phaseDone&&e.hp/e.mhp<=e.phaseThreshold){
        e._phaseDone=true;
        e.spd*=1.18;
        e.frate=Math.max(.18,e.frate*.78);
        e.shield=Math.min(e.shieldMax,e.shield+e.shieldMax*.6);
        announce(e.lb,e.col,'Phase shift');
      }
    }
    // FIX: contactCd was missing initialization in spawnEnemy (now init'd above)
    if(e._contactCd>0){e._contactCd-=1/60;}
    else if(dst2(e.x,e.y,P.x,P.y)<(e.r+P.r)*(e.r+P.r)){
      P.takeDmg(e.dm*(e.boss?.8:.4));
      e._contactCd=.5;
      const ka=ang(e.x,e.y,P.x,P.y);
      P.vx+=Math.cos(ka)*(e.boss?6:3.5);P.vy+=Math.sin(ka)*(e.boss?6:3.5);
    }
  }
}

function drwEnemies(){
  const z=cam.z,now=Date.now();
  for(const e of enemies){
    if(!cam.vis(e.x,e.y,e.r+40))continue;
    const sx=cam.sx(e.x),sy=cam.sy(e.y),sr=Math.max(4,e.r*z);
    const hitFlash=e.ft>0;
    const col=hitFlash?'#ffffff':e.col;
    const body=hitFlash?'#cccccc':e.body||e.col;

    if(e.boss||e.tech>1){
      const pulse=(e.boss?.12:.08)+.07*Math.sin(now*.005+e.x*.001);
      ctx.save();ctx.globalAlpha=pulse;ctx.fillStyle=col;
      ctx.beginPath();ctx.arc(sx,sy,sr*(e.boss?1.7:1.35),0,PI2);ctx.fill();ctx.restore();
      ctx.save();ctx.globalAlpha=.25;ctx.strokeStyle=e.accent||col;ctx.lineWidth=Math.max(1.2,(e.boss?2.5:1.5)*z);
      ctx.setLineDash([Math.max(3,5*z),Math.max(3,5*z)]);
      ctx.translate(sx,sy);ctx.rotate(now*.0012);
      ctx.beginPath();ctx.arc(0,0,sr*(e.boss?1.35:1.12),0,PI2);ctx.stroke();ctx.restore();
    }

    const barrels=e.barrels||[{a:0,w:10,l:32}];
    ctx.save();ctx.translate(sx,sy);ctx.rotate(e.angle);
    for(const b of barrels){
      ctx.save();ctx.rotate(b.a||0);
      const bw=Math.max(3,b.w*z),bl=Math.max(6,b.l*z);
      ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.fillRect(2,-bw/2+1,bl,bw);ctx.globalAlpha=1;
      const bg=safeLinear(0,-bw/2,0,bw/2);
      if(bg){bg.addColorStop(0,'#aaa');bg.addColorStop(.4,body);bg.addColorStop(1,'#333');ctx.fillStyle=bg;}
      else ctx.fillStyle=body;
      ctx.fillRect(0,-bw/2,bl,bw);
      ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=Math.max(.8,1.2*z);ctx.strokeRect(0,-bw/2,bl,bw);
      ctx.fillStyle=hitFlash?'#fff':col;ctx.globalAlpha=.7;
      ctx.beginPath();ctx.arc(bl,0,bw*.38,0,PI2);ctx.fill();ctx.globalAlpha=1;
      ctx.restore();
    }
    ctx.restore();

    const shape=e.shape||'circle';
    ctx.save();ctx.translate(sx,sy);ctx.rotate(e.angle+Math.PI*.25);
    ctx.beginPath();
    if(shape==='circle'){ctx.arc(0,0,sr,0,PI2);}
    else if(shape==='square'){const s=sr*.9;ctx.rect(-s,-s,s*2,s*2);}
    else if(shape==='triangle'){poly(0,0,sr,3,0);}
    else if(shape==='pentagon'){poly(0,0,sr,5,0);}
    else if(shape==='hexagon'){poly(0,0,sr,6,0);}
    else if(shape==='octagon'){poly(0,0,sr,8,0);}
    else if(shape==='star'){
      ctx.beginPath();
      for(let i=0;i<10;i++){const a=i*Math.PI/5,r2=i%2===0?sr:sr*.45;i?ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2);}
      ctx.closePath();
    }
    const bodyGrad=ctx.createRadialGradient(-sr*.2,-sr*.2,0,0,0,sr);
    bodyGrad.addColorStop(0,col);bodyGrad.addColorStop(.6,body);bodyGrad.addColorStop(1,'#111');
    ctx.fillStyle=bodyGrad;ctx.fill();
    ctx.strokeStyle=hitFlash?'rgba(255,255,255,.8)':e.boss?col:'rgba(0,0,0,.5)';
    ctx.lineWidth=Math.max(1.5,e.boss?3*z:2*z);ctx.stroke();
    if(sr>20){
      ctx.globalAlpha=.35;ctx.strokeStyle=e.accent||col;ctx.lineWidth=Math.max(1,1.5*z);
      ctx.beginPath();ctx.arc(0,0,sr*.55,0,PI2);ctx.stroke();
    }
    if(e.ornaments){
      ctx.globalAlpha=.5;
      const nodes=Math.min(8,e.ornaments);
      for(let i=0;i<nodes;i++){
        const na=i*PI2/nodes+now*.0004*(e.boss?1.2:.6);
        ctx.fillStyle=e.accent||'#fff';
        ctx.beginPath();ctx.arc(Math.cos(na)*sr*.72,Math.sin(na)*sr*.72,Math.max(1.5,sr*.09),0,PI2);ctx.fill();
      }
    }
    ctx.restore();
    if(e.shieldMax>0&&e.shield>0){
      ctx.save();
      ctx.globalAlpha=.22+.1*Math.sin(now*.006);
      ctx.strokeStyle=e.accent||'#99eeff';
      ctx.lineWidth=Math.max(2,2.6*z);
      ctx.beginPath();
      ctx.arc(sx,sy,sr+7*z,0,PI2*cl(e.shield/e.shieldMax,0,1));
      ctx.stroke();
      ctx.restore();
    }

    const hpr2=cl(e.hp/e.mhp,0,1);
    const bw2=sr*(e.boss?2:1.8),bh=Math.max(2,e.boss?5*z:3.5*z),bx=sx-bw2/2,by=sy-sr-bh-(e.boss?5:3)*z;
    ctx.fillStyle='rgba(0,0,0,.45)';rr(bx,by,bw2,bh,2);ctx.fill();
    ctx.fillStyle=hpr2>.6?'#44dd55':hpr2>.3?'#ffcc00':'#ff3300';
    rr(bx,by,Math.max(2,bw2*hpr2),bh,2);ctx.fill();
    if(e.shieldMax>0&&e.shield>0){
      const spr=cl(e.shield/e.shieldMax,0,1);
      ctx.fillStyle='rgba(90,220,255,.85)';
      rr(bx,by-5*z,Math.max(2,bw2*spr),Math.max(1.5,2*z),2);ctx.fill();
    }

    if(e.boss){
      ctx.font=`bold ${Math.max(9,Math.round(11*z))}px 'Exo 2'`;
      ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=3.5;
      ctx.strokeText(e.lb,sx,by-6*z);ctx.fillStyle=col;ctx.fillText(e.lb,sx,by-6*z);
    } else {
      ctx.font=`${Math.max(6,Math.round(7*z))}px 'Exo 2'`;
      ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.65)';
      ctx.fillText(e.lb,sx,by-4*z);
    }
  }
}

// ── WAVE SYSTEM ──────────────────────────────────────────────
const waveState={
  wave:0,phase:'between',
  countdown:5,
  toSpawn:[],
  spawnTimer:0,
  enemiesThisWave:0,
  killedThisWave:0,
  bossCount:0,
};

function buildWave(n){
  const list=[];
  if(n<=0)return list;
  const tier=Math.floor(n/10);
  const minions=n+4+tier*(tier+1);
  const unlocked=getUnlockedVariantCount(n);
  // All minions spawn immediately at wave start
  for(let i=0;i<minions;i++){
    let idx=0;
    if(unlocked>1){
      const bias=Math.floor(i/Math.max(2,Math.floor(7-Math.min(5,n/18))));
      idx=cl(unlocked-1-bias-ri(0,Math.min(1,unlocked-1)),0,unlocked-1);
    }
    list.push({type:'tank:'+idx,delay:0});
  }
  // Boss arrives 1 second after minions
  list.push({type:'boss:'+n,delay:1});
  return list;
}

function startWave(){
  waveState.wave++;
  waveState.phase='active';
  waveState.toSpawn=buildWave(waveState.wave);
  waveState.spawnTimer=0;
  waveState.enemiesThisWave=waveState.toSpawn.length;
  waveState.killedThisWave=0;
  waveState.bossCount=1;
  const unlocked=getUnlockedVariantCount(waveState.wave);
  const sub=(waveState.wave>1&&(waveState.wave-1)%3===0)
    ?'New enemy type unlocked: '+makeVariantSpec(unlocked-1,false).lb
    :'1 boss, '+(waveState.enemiesThisWave-1)+' tanks';
  announce('Wave '+waveState.wave,'#ff6644',sub);
  SFX.wave();flash('rgba(255,100,0,.2)',.6);
}

function updWave(dt){
  if(waveState.phase==='between'){
    waveState.countdown-=dt;
    if(waveState.countdown<=0)startWave();
    return;
  }
  if(waveState.phase==='active'){
    waveState.spawnTimer+=dt;
    for(let i=waveState.toSpawn.length-1;i>=0;i--){
      const s=waveState.toSpawn[i];
      if(waveState.spawnTimer>=s.delay){spawnFromLeft(s.type);waveState.toSpawn.splice(i,1);}
    }
    if(waveState.toSpawn.length===0&&enemies.length===0){
      waveState.phase='cards';
      showCards=true;
      buildCardChoices();
      announce('Wave '+waveState.wave+' complete!','#44ffcc','Choose a card!');
      SFX.card();
    }
  }
}

// ── COLLISION ────────────────────────────────────────────────
function collide(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];let rm=false;
    if(b.owner==='p'){
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];
        if(dst2(b.x,b.y,e.x,e.y)<(b.r+e.r)*(b.r+e.r)){
          let dealt=b.dm;
          if(e.shield>0){
            const absorbed=Math.min(e.shield,dealt);
            e.shield-=absorbed;
            dealt-=absorbed;
            spark(b.x,b.y,e.accent||'#88ddff',4,2.5,12);
          }
          if(dealt>0)e.hp-=dealt;
          e.ft=3;spark(b.x,b.y,e.col,4,2.5,15);b.pen--;
          if(P._explode||P.stats.explodeR>0){
            const blastR=55+P._explode*18+(P.stats.explodeR*.8);
            const blastDmg=b.dm*(.2*(P._explode||1))*(1+P.stats.explodeR*.01);
            for(let k=enemies.length-1;k>=0;k--){
              if(k===j)continue;
              const ex=enemies[k];
              if(dst2(b.x,b.y,ex.x,ex.y)<=blastR*blastR){
                let splashDmg=blastDmg;
                if(ex.shield>0){
                  const absorbed=Math.min(ex.shield,splashDmg);
                  ex.shield-=absorbed;
                  splashDmg-=absorbed;
                }
                ex.hp-=splashDmg;
                ex.ft=3;
                if(ex.hp<=0)onEnemyDie(ex,k);
              }
            }
            spark(b.x,b.y,'#ff8844',8+P._explode*2,4,22);
          }
          if(P.stats.lifesteal>0)P.hp=Math.min(P.mhp,P.hp+b.dm*P.eRegen2);
          if(e.hp<=0){onEnemyDie(e,j);}
          if(b.pen<=0){rm=true;break;}
        }
      }
    } else if(b.owner==='e'){
      if(dst2(b.x,b.y,P.x,P.y)<(b.r+P.r)*(b.r+P.r)){P.takeDmg(b.dm*.4);rm=true;}
    }
    if(rm){
      if(b.owner==='e')triggerEnemyBulletSplit(b);
      bullets.splice(i,1);
    }
  }
}

function onEnemyDie(e,idx){
  spark(e.x,e.y,e.col,e.boss?20:10,e.boss?5:3,e.boss?50:30);
  if(e.boss){flash('rgba(255,100,0,.4)',.8);cam.shake=8;SFX.wave();P.pts+=1;announce('Boss defeated! +1 upgrade pt','#ffcc44');}
  P.score+=Math.floor(e.sc*(1+waveState.wave*.05));
  P.addXP(e.xp);P.kills++;
  waveState.killedThisWave++;
  enemies.splice(idx,1);
}

  announce('YOU DIED','#ff4444','Respawning...');

function getUnlockedClasses(){
  return Object.keys(CLASS_UNLOCK_LEVELS).filter(c=>P.lv>=CLASS_UNLOCK_LEVELS[c]);
}

function checkClassUnlocks(lv){
  if((lv===15||lv===30||lv===45||lv===60||lv===75||lv===100)&&TANK_TREE[P.cls]&&TANK_TREE[P.cls].length)offerEvolution();
}

// FIX: unlockedClasses was referenced in buildCardChoices but never defined
const unlockedClasses=new Set(['basic']);

const RARITY_W={common:60,uncommon:30,rare:15,epic:5,legendary:1};
function buildCardChoices(){
  cardPicksLeft=1;
  const alreadyHave=new Set(activeCards.map(c=>c.id));
  // Vampiric can only be picked once total
  const pool=ALL_CARDS.filter(c=>!(c.id==='lifesteal_up'&&alreadyHave.has('lifesteal_up')));
  const luckMul=1+P.stats.lucky*.015;
  const RW={common:RARITY_W.common,uncommon:RARITY_W.uncommon*luckMul,rare:RARITY_W.rare*luckMul,epic:RARITY_W.epic*luckMul,legendary:RARITY_W.legendary*luckMul};
  const picked=[];
  const used=new Set();
  for(let attempt=0;attempt<80&&picked.length<3;attempt++){
    let wt=0;for(const c of pool)wt+=RW[c.rarity]||10;
    let r=Math.random()*wt;
    for(const c of pool){r-=RW[c.rarity]||10;if(r<=0&&!used.has(c.id)){picked.push(c);used.add(c.id);break;}}
  }
  // FIX: fallback — fill remaining slots with whatever isn't used
  if(picked.length<3){
    for(const c of pool){if(!used.has(c.id)&&picked.length<3){picked.push(c);used.add(c.id);}}
  }
  cardChoices=picked;
}

function pickCard(idx){
  const c=cardChoices[idx];if(!c)return;
  c.apply();activeCards.push(c);
  cardChoices.splice(idx,1);
  cardPicksLeft--;
  SFX.card();
  if(cardPicksLeft<=0){
    showCards=false;cardChoices=[];
    waveState.phase='between';waveState.countdown=4;
  }
}

window.addEventListener('keydown',e=>{

  if(e.key==='Escape'){showClassPicker=false;showUpgrades=false;}
  if(k==='r'&&isDead){doRespawn();}

    enemies.length=0;waveState.toSpawn=[];
    P.lv=60;P.xp=0;P.xpN=Math.floor(80*Math.pow(1.12,60));P.pts+=50;
    P.mhp=P.emhp;P.hp=P.mhp;
    checkClassUnlocks(60);
    cardChoices=[...ALL_CARDS,...ALL_CARDS,...ALL_CARDS].sort(()=>Math.random()-.5).slice(0,100);
    cardPicksLeft=50;
    showCards=true;
    waveState.wave=50;waveState.phase='cards';
  }

    if(waveState.phase==='between')waveState.wave++;

  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});

function handleClick(cx,cy){
  if(isDead&&deathTimer<=0){doRespawn();return;}
  if(showEvolution){
    const n=evolutionChoices.length,cols=Math.min(3,n),rows=Math.ceil(n/cols);
    const cw=Math.min(270,(W-60)/cols-16),ch=310,gap=14;
    const totalW=cols*(cw+gap)-gap,totalH=rows*(ch+gap)-gap;
    const startX=W/2-totalW/2,startY=H/2-totalH/2+18;
    for(let i=0;i<n;i++){
      const x=startX+(i%cols)*(cw+gap),y=startY+Math.floor(i/cols)*(ch+gap);
      if(cx>=x&&cx<x+cw&&cy>=y&&cy<y+ch){pickEvolution(i);return;}
    }
    return;
  }
  if(showClassPicker){
    const list=getUnlockedClasses();
    const ih=52,pw2=340,ph=list.length*ih+80,px2=W/2-pw2/2,py2=H/2-ph/2;
    let yy=py2+50;
    for(let i=0;i<list.length;i++){
      if(cx>=px2+8&&cx<px2+pw2-8&&cy>=yy&&cy<yy+48){
        P.cls=list[i];
        // FIX: recalculate mhp after class switch
        P.mhp=P.emhp;P.hp=Math.min(P.hp,P.mhp);
        showClassPicker=false;SFX.lvl();announce('Class: '+TANK_CLASSES[list[i]].lb,classColor(list[i]));
        return;
      }
      yy+=ih;
    }
    showClassPicker=false;// click outside closes
    return;
  }
  if(showCards){
    if(!cardChoices.length)return;
    const n=cardChoices.length,cols=n>5?5:n,cw=n>5?160:240,ch=n>5?185:270,gap=n>5?12:24;
    const totalW=cols*(cw+gap)-gap,startX=W/2-totalW/2,startY=Math.max(90,H/2-Math.ceil(n/cols)*(ch+gap)/2);
    for(let i=0;i<n;i++){
      const col=i%cols,row=Math.floor(i/cols),x=startX+col*(cw+gap),y=startY+row*(ch+gap);
      if(cx>=x&&cx<x+cw&&cy>=y&&cy<y+ch){pickCard(i);return;}
    }
    return;
  }
  if(showUpgrades){
    const pw2=440,ph=Math.min(H-40,STAT_DEFS.length*44+90),px2=W/2-pw2/2,py2=H/2-ph/2;
    let yy=py2+55;
    for(const s of STAT_DEFS){
      const minusBx=px2+260,plusBx=px2+295,bby=yy+8,bbh=24;
      if(cy>=bby&&cy<bby+bbh){
        if(cx>=minusBx&&cx<minusBx+28&&P.stats[s.id]>0){P.stats[s.id]--;P.pts++;P.mhp=P.emhp;P.hp=Math.min(P.hp,P.mhp);SFX.hit();}
        else if(cx>=plusBx&&cx<plusBx+28&&P.pts>0&&P.stats[s.id]<s.max){P.stats[s.id]++;P.pts--;P.mhp=P.emhp;P.hp=Math.min(P.hp,P.mhp);SFX.lvl();}
      }
      yy+=44;
    }
    return;
  }
}

// ── ANNOUNCEMENTS ────────────────────────────────────────────
const announcements=[];
function announce(text,col,sub){
  if(!text)return;
  // FIX: deduplicate rapid identical announcements
  if(announcements.length>0&&announcements[announcements.length-1].text===text)return;
  announcements.push({text,col:col||'#fff',sub:sub||'',life:180,ml:180});
  if(announcements.length>4)announcements.shift();
}
function drwAnnouncements(){
  for(let i=announcements.length-1;i>=0;i--){
    const a=announcements[i];a.life--;
    if(a.life<=0){announcements.splice(i,1);continue;}
    const al=a.life<30?a.life/30:Math.min(1,(a.ml-a.life)/12);
    const yoff=(announcements.length-1-i)*38;
    ctx.save();ctx.globalAlpha=al;ctx.textAlign='center';
    ctx.font=`bold 22px 'Exo 2'`;ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=4;
    ctx.strokeText(a.text,W/2,H/2-90-yoff);ctx.fillStyle=a.col;ctx.fillText(a.text,W/2,H/2-90-yoff);
    if(a.sub){ctx.font='11px Exo 2';ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillText(a.sub,W/2,H/2-68-yoff);}
    ctx.restore();
  }
}

// ── DRAW WORLD ───────────────────────────────────────────────
function drwWorld(){
  ctx.fillStyle='#0e1020';ctx.fillRect(0,0,W,H);
  const ax=cam.sx(0),ay=cam.sy(0),aw=MAP.W*cam.z,ah=MAP.H*cam.z;
  const fg=ctx.createRadialGradient(ax+aw/2,ay+ah/2,0,ax+aw/2,ay+ah/2,Math.max(aw,ah)*.75);
  fg.addColorStop(0,'#12182e');fg.addColorStop(1,'#0a0e1c');
  ctx.fillStyle=fg;ctx.fillRect(ax,ay,aw,ah);
  ctx.save();ctx.globalAlpha=.07;ctx.strokeStyle='#4466aa';ctx.lineWidth=1;
  const gw=60,gx0=Math.floor(cam.x/gw)*gw,gy0=Math.floor(cam.y/gw)*gw;
  for(let gx=gx0;gx<cam.x+W/cam.z+gw;gx+=gw){const sx=cam.sx(gx);ctx.beginPath();ctx.moveTo(sx,ay);ctx.lineTo(sx,ay+ah);ctx.stroke();}
  for(let gy=gy0;gy<cam.y+H/cam.z+gw;gy+=gw){const sy=cam.sy(gy);ctx.beginPath();ctx.moveTo(ax,sy);ctx.lineTo(ax+aw,sy);ctx.stroke();}
  ctx.restore();
  ctx.save();ctx.strokeStyle='rgba(80,120,200,.5)';ctx.lineWidth=3;ctx.strokeRect(ax,ay,aw,ah);
  ctx.globalAlpha=.15;ctx.strokeStyle='rgba(80,120,200,.8)';ctx.lineWidth=8;ctx.strokeRect(ax,ay,aw,ah);ctx.restore();
}
function drwPickups(){
  const z=cam.z,now=Date.now();
  for(const pk of pickups){
    if(!cam.vis(pk.x,pk.y,30))continue;
    const def=PICKUP_DEFS[pk.type];if(!def)continue;
    const sx=cam.sx(pk.x),sy=cam.sy(pk.y),sr=Math.max(6,pk.r*z);
    const fade=pk.life<120?pk.life/120:1;
    ctx.save();ctx.globalAlpha=fade*(.85+.15*Math.sin(now*.004+pk.x));
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(sx+2,sy+2,sr,0,PI2);ctx.fill();
    ctx.fillStyle=def.col;ctx.beginPath();ctx.arc(sx,sy,sr,0,PI2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(sx-sr*.25,sy-sr*.25,sr*.35,0,PI2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=Math.max(1,1.5*z);ctx.beginPath();ctx.arc(sx,sy,sr,0,PI2);ctx.stroke();
    ctx.restore();
  }
}

// ── DRAW WALLS ───────────────────────────────────────────────
function drwWalls(){
  const z=cam.z;
  for(const w of walls){
    const wx=cam.sx(w.x),wy=cam.sy(w.y),ww=Math.round(w.w*z),wh=Math.round(w.h*z);
    if(wx+ww<0||wx>W||wy+wh<0||wy>H)continue;
    ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';ctx.fillRect(wx+3,wy+4,ww,wh);ctx.restore();
    const g=safeLinear(wx,wy,wx+ww,wy+wh);
    if(g){g.addColorStop(0,'#7a6a5a');g.addColorStop(1,'#4a3c30');ctx.fillStyle=g;}else ctx.fillStyle='#5a4c3c';
    rr(wx,wy,ww,wh,3);ctx.fill();
    ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#fff';rr(wx,wy,ww,Math.max(1,Math.round(3*z)),2);ctx.fill();ctx.restore();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.2;rr(wx,wy,ww,wh,3);ctx.stroke();
  }
}

    for(let i=0;i<bossList.length;i++){
      const b=bossList[i],bpx=cx-bw/2,bpy=startY+i*(bh+gap);
      ctx.fillStyle='rgba(0,0,0,.55)';rr(bpx-5,bpy-4,bw+10,bh+8,5);ctx.fill();
      const bpr=cl(b.hp/b.mhp,0,1);
      ctx.fillStyle=bpr>.5?'#cc2200':'#ff6600';rr(bpx,bpy,Math.max(2,bw*bpr),bh,3);ctx.fill();
      ctx.font='bold 8px Exo 2';ctx.textAlign='left';ctx.fillStyle=b.col;ctx.fillText(b.lb,bpx,bpy-6);
      ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='7px Exo 2';ctx.fillText(fsc(b.hp)+'/'+fsc(b.mhp),bpx+bw,bpy-6);
    }
  }

  // Upgrade points badge
  if(P.pts>0&&!showUpgrades){
    const pulse=.8+.2*Math.sin(Date.now()*.008);
    ctx.save();ctx.globalAlpha=pulse;ctx.fillStyle='rgba(0,200,140,.9)';rr(cx+100,H-52,110,24,8);ctx.fill();
    ctx.font='bold 10px Exo 2';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#001a12';ctx.fillText(P.pts+' pts [U]',cx+155,H-40);ctx.restore();
  }

  // Active cards
  if(activeCards.length){
    ctx.font='7px Exo 2';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText('Cards: '+activeCards.map(c=>c.lb).join(' · '),8,H-44);
  }

  if(autoFire){ctx.save();ctx.font='bold 8px Exo 2';ctx.textAlign='right';ctx.fillStyle='#ffcc44';ctx.fillText('AUTO ON',W-8,H-14);ctx.restore();}

  // ── MINIMAP ──────────────────────────────────────────────────────────────
  {
    const mmSz=150,mmX=W-mmSz-10,mmY=H-mmSz-10;
    const msx=mmSz/MAP.W,msy=mmSz/MAP.H;
    ctx.save();
    ctx.fillStyle='rgba(4,6,16,.88)';rr(mmX,mmY,mmSz,mmSz,7);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;rr(mmX,mmY,mmSz,mmSz,7);ctx.stroke();
    ctx.beginPath();rr(mmX,mmY,mmSz,mmSz,7);ctx.clip();
    ctx.fillStyle='rgba(120,110,90,.15)';ctx.fillRect(mmX,mmY,mmSz,mmSz);
    ctx.fillStyle='rgba(100,80,60,.6)';
    for(const w of walls){ctx.fillRect(mmX+w.x*msx,mmY+w.y*msy,Math.max(1,w.w*msx),Math.max(1,w.h*msy));}
    for(const pk of pickups){
      const def=PICKUP_DEFS[pk.type];if(!def)continue;
      const px2=mmX+pk.x*msx,py2=mmY+pk.y*msy;
      ctx.fillStyle=def.mmCol||'#fff';
      ctx.beginPath();ctx.arc(px2,py2,2.5,0,PI2);ctx.fill();
    }
    for(const e of enemies){
      const ex=mmX+e.x*msx,ey=mmY+e.y*msy;
      ctx.fillStyle=e.boss?'#ff3333':e.col;
      ctx.globalAlpha=e.boss?1:.8;
      const ds=e.boss?4:2.5;ctx.fillRect(ex-ds/2,ey-ds/2,ds,ds);
    }
    ctx.globalAlpha=1;
    const ppx=mmX+P.x*msx,ppy=mmY+P.y*msy;
    ctx.fillStyle='rgba(0,220,180,.25)';ctx.beginPath();ctx.arc(ppx,ppy,7,0,PI2);ctx.fill();
    ctx.fillStyle='#00e8ca';ctx.beginPath();ctx.arc(ppx,ppy,3.5,0,PI2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ppx,ppy,3.5,0,PI2);ctx.stroke();
    const vwW=(W/cam.z)*msx,vwH=(H/cam.z)*msy;
    ctx.strokeStyle='rgba(0,232,202,.35)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.strokeRect(mmX+cam.x*msx,mmY+cam.y*msy,vwW,vwH);ctx.setLineDash([]);
    ctx.restore();
    ctx.font='bold 7px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillText('MAP',mmX+mmSz/2,mmY-4);
  }
}

// ── DRAW CARDS ───────────────────────────────────────────────
const RARITY_COL={common:'#88aacc',uncommon:'#44cc88',rare:'#8844ff',epic:'#ff8800',legendary:'#ffdd00'};
function drwCards(){
  if(!showCards||!cardChoices.length)return;
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  const pickLabel=cardPicksLeft>1?cardPicksLeft+' picks left':'Choose a Card';
  ctx.font='bold 20px Exo 2';ctx.textAlign='center';ctx.fillStyle='#ffcc44';
  ctx.fillText('Wave '+waveState.wave+' Complete!  —  '+pickLabel,W/2,36);
  ctx.font='10px Exo 2';ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText('Click a card to pick it',W/2,55);
  const n=cardChoices.length,cols=n>5?5:n,cw=n>5?160:240,ch=n>5?185:270,gap=n>5?12:24;
  const totalW=cols*(cw+gap)-gap,startX=W/2-totalW/2;
  const rows=Math.ceil(n/cols),totalH=rows*(ch+gap)-gap,startY=Math.max(70,H/2-totalH/2);
  for(let i=0;i<n;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const c=cardChoices[i],x=startX+col*(cw+gap),y=startY+row*(ch+gap);
    const hov=mx>=x&&mx<x+cw&&my>=y&&my<y+ch;
    ctx.save();if(hov){ctx.translate(x+cw/2,y+ch/2);ctx.scale(1.05,1.05);ctx.translate(-(x+cw/2),-(y+ch/2));}
    ctx.fillStyle=hov?'rgba(20,24,50,.98)':'rgba(10,12,32,.95)';rr(x,y,cw,ch,12);ctx.fill();
    ctx.strokeStyle=RARITY_COL[c.rarity]||'#888';ctx.lineWidth=hov?3:1.5;rr(x,y,cw,ch,12);ctx.stroke();
    const fs=n>5?7:8;
    ctx.fillStyle=RARITY_COL[c.rarity];ctx.font='bold '+fs+'px Exo 2';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(c.rarity.toUpperCase(),x+cw/2,y+8);
    ctx.font='bold '+(n>5?12:16)+'px Exo 2';ctx.fillStyle=c.col||'#fff';ctx.fillText(c.lb,x+cw/2,y+(n>5?24:50));
    const divY=n>5?44:78;
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+12,y+divY);ctx.lineTo(x+cw-12,y+divY);ctx.stroke();
    ctx.font=(n>5?9:11)+'px Exo 2';ctx.fillStyle='rgba(255,255,255,.7)';
    const words=c.desc.split(' '),lines=[];let line='';
    const maxCh=n>5?18:22;
    for(const w of words){if((line+' '+w).trim().length>maxCh){lines.push(line.trim());line=w;}else line+=(line?' ':'')+w;}
    lines.push(line.trim());
    const descY=n>5?y+52:y+92,lineH=n>5?14:18;
    for(let li=0;li<lines.length&&li<5;li++)ctx.fillText(lines[li],x+cw/2,descY+li*lineH);
    ctx.restore();
  }
}

// ── DRAW CLASS PICKER ────────────────────────────────────────
function drwClassPicker(){
  if(!showClassPicker)return;
  const list=getUnlockedClasses();
  const ih=52,pw2=340,ph=list.length*ih+100,px2=W/2-pw2/2,py2=H/2-ph/2;
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(5,8,22,.97)';rr(px2,py2,pw2,ph,14);ctx.fill();
  ctx.strokeStyle='rgba(0,220,180,.5)';ctx.lineWidth=2;rr(px2,py2,pw2,ph,14);ctx.stroke();
  ctx.font='bold 14px Exo 2';ctx.textAlign='center';ctx.fillStyle='#00e8ca';ctx.fillText('Choose Class  [C]',W/2,py2+22);
  ctx.font='8px Exo 2';ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('Lv1: Basic  ·  Lv15: Tier1  ·  Lv30: Tier2  ·  Lv45: Tier3  ·  Lv60: Tier4  ·  Lv75: Tier5',W/2,py2+40);
  let yy=py2+54;
  for(const c of list){
    const tc=TANK_CLASSES[c],col=classColor(c);
    const hov=mx>=px2+8&&mx<px2+pw2-8&&my>=yy&&my<yy+ih-4;
    ctx.fillStyle=hov?'rgba(255,255,255,.1)':'rgba(255,255,255,.04)';rr(px2+8,yy,pw2-16,ih-4,7);ctx.fill();
    if(c===P.cls){ctx.strokeStyle='rgba(0,220,180,.5)';ctx.lineWidth=1.5;rr(px2+8,yy,pw2-16,ih-4,7);ctx.stroke();}
    ctx.font='bold 12px Exo 2';ctx.textAlign='left';ctx.fillStyle=col;ctx.fillText((c===P.cls?'▶ ':'')+tc.lb,px2+18,yy+16);
    ctx.font='8px Exo 2';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(tc.desc,px2+18,yy+30);
    yy+=ih;
  }
  // Show locked tiers
  const allTiers=[
    {lv:15,classes:['twin','sniper','machineGun']},
    {lv:30,classes:['triShot','flank','destroyer']},
    {lv:45,classes:['penta','booster','octo','overlord','godTank']},
  ];
  for(const tier of allTiers){
    if(P.lv<tier.lv){
      ctx.fillStyle='rgba(255,255,255,.05)';rr(px2+8,yy,pw2-16,32,7);ctx.fill();
      ctx.font='bold 9px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.fillText('Locked Lv'+tier.lv+': '+tier.classes.map(c=>TANK_CLASSES[c].lb).join(', '),W/2,yy+20);
      yy+=38;break;
    }
  }
}

// ── DRAW EVOLUTION PICKER ────────────────────────────────────
function drwEvolutionPicker(){
  if(!showEvolution||!evolutionChoices.length)return;
  ctx.fillStyle='rgba(0,0,12,.88)';ctx.fillRect(0,0,W,H);
  ctx.font='bold 24px Exo 2';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=5;ctx.strokeText('Tank Evolution',W/2,18);
  ctx.fillStyle='#00e8ca';ctx.fillText('Tank Evolution',W/2,18);
  ctx.font='11px Exo 2';ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText('Current: '+TANK_CLASSES[P.cls].lb+' — choose your next form',W/2,50);

  const n=evolutionChoices.length,cols=Math.min(3,n),rows=Math.ceil(n/cols);
  const cw=Math.min(270,(W-60)/cols-16),ch=310,gap=14;
  const totalW=cols*(cw+gap)-gap,totalH=rows*(ch+gap)-gap;
  const startX=W/2-totalW/2,startY=H/2-totalH/2+18;

  for(let i=0;i<n;i++){
    const clsKey=evolutionChoices[i],tc=TANK_CLASSES[clsKey],col=classColor(clsKey);
    const col2=i%cols,row2=Math.floor(i/cols);
    const x=startX+col2*(cw+gap),y=startY+row2*(ch+gap);
    const hov=mx>=x&&mx<x+cw&&my>=y&&my<y+ch;
    ctx.save();
    if(hov){ctx.translate(x+cw/2,y+ch/2);ctx.scale(1.04,1.04);ctx.translate(-(x+cw/2),-(y+ch/2));}
    ctx.fillStyle=hov?'rgba(22,32,60,.98)':'rgba(10,14,32,.95)';rr(x,y,cw,ch,12);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=hov?3:1.5;rr(x,y,cw,ch,12);ctx.stroke();
    ctx.save();ctx.globalAlpha=.18;ctx.fillStyle=col;rr(x,y,cw,44,12);ctx.fill();ctx.restore();
    ctx.font='bold 17px Exo 2';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle=col;ctx.fillText(tc.lb,x+cw/2,y+12);
    ctx.font='9px Exo 2';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(tc.desc,x+cw/2,y+36);
    // Barrel preview
    const px2=x+cw/2,py2=y+108,pr=18;
    ctx.save();ctx.translate(px2,py2);
    for(const b of tc.barrels){
      ctx.save();ctx.rotate(b.a);const bw=Math.max(2,b.w*.38),bl=Math.max(5,b.l*.38);
      ctx.fillStyle='#888';ctx.fillRect(0,-bw/2,bl,bw);
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.8;ctx.strokeRect(0,-bw/2,bl,bw);ctx.restore();
    }
    ctx.beginPath();ctx.arc(0,0,pr,0,PI2);ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
    // Stats
    const stats=[{lb:'HP',v:tc.hm},{lb:'SPD',v:tc.sm},{lb:'FIRE',v:1/tc.fm}];
    const sbw=(cw-24)/3-4,sby=y+148,sbh=38,sbx=x+12;
    for(let s=0;s<3;s++){
      const st=stats[s],sx2=sbx+s*(sbw+4);
      ctx.fillStyle='rgba(255,255,255,.06)';rr(sx2,sby,sbw,sbh,5);ctx.fill();
      ctx.font='bold 6px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillText(st.lb,sx2+sbw/2,sby+9);
      const pct=Math.round((st.v-1)*100);
      ctx.font='bold 13px Exo 2';ctx.fillStyle=pct>0?'#44ff88':pct<0?'#ff6644':'#ccc';
      ctx.fillText((pct>0?'+':'')+pct+'%',sx2+sbw/2,sby+28);
    }
    // Next hint
    const nexts=TANK_TREE[clsKey];
    ctx.font='7px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.28)';
    if(nexts&&nexts.length)ctx.fillText('→ '+nexts.map(k=>TANK_CLASSES[k].lb).join(' / '),x+cw/2,y+198);
    else{ctx.fillStyle='rgba(255,220,0,.5)';ctx.fillText('★ FINAL FORM',x+cw/2,y+198);}
    // Button
    const btnY=y+ch-44;
    ctx.fillStyle=hov?col:'rgba(255,255,255,.07)';rr(x+20,btnY,cw-40,32,8);ctx.fill();
    ctx.font='bold 12px Exo 2';ctx.fillStyle=hov?'#000':'rgba(255,255,255,.4)';
    ctx.fillText('Choose',x+cw/2,btnY+17);
    ctx.restore();
  }
}

// ── UPGRADE PANEL ────────────────────────────────────────────
let showUpgrades=false;
const STAT_DEFS=[
  // ── CORE ─────────────────────────────────────────────────────
  {id:'hp',        lb:'Max HP',          desc:'+18% max HP per pt (base 150)',          max:1000},
  {id:'reg',       lb:'Regen',           desc:'+14% regen per pt (base 5/s)',           max:1000},
  {id:'spd',       lb:'Move Speed',      desc:'+10% speed per pt',                      max:1000},
  {id:'armor',     lb:'Armor',           desc:'+0.8% dmg reduction per pt (max 75%)',   max:1000},
  // ── OFFENSE ──────────────────────────────────────────────────
  {id:'dmg',       lb:'Damage',          desc:'+10% damage per pt',                     max:1000},
  {id:'fire',      lb:'Fire Rate',       desc:'+10% fire rate per pt',                  max:1000},
  {id:'bspd',      lb:'Bullet Speed',    desc:'+10% bullet speed per pt',               max:1000},
  {id:'pen',       lb:'Penetration',     desc:'+1 pierce per 2 pts',                    max:1000},
  {id:'crit',      lb:'Crit Chance',     desc:'+0.8% crit per pt (base 5%)',            max:1000},
  {id:'bulSize',   lb:'Bullet Size',     desc:'+0.8% bullet size per pt — bigger hits', max:1000},
  {id:'multishot', lb:'Multishot',       desc:'Extra bullet every 20 pts',              max:1000},
  {id:'range',     lb:'Range',           desc:'+10% bullet range per pt',               max:1000},
  // ── UTILITY ──────────────────────────────────────────────────
  {id:'lifesteal', lb:'Lifesteal',       desc:'+0.5% HP stolen per bullet hit',         max:1000},
  {id:'xpGain',    lb:'XP Gain',         desc:'+1% bonus XP per kill per pt',           max:1000},
  {id:'lucky',     lb:'Lucky',           desc:'+1.5% rare card chance per pt',          max:1000},
  {id:'explodeR',  lb:'Explosion Power', desc:'+0.8 blast radius, +1% blast dmg per pt',max:1000},
  {id:'recoil',    lb:'Recoil Boost',    desc:'+0.4 speed burst when firing per pt',    max:1000},
  {id:'scatter',   lb:'Scatter',         desc:'+0.5% bullet spread (chaos) per pt',     max:1000},

function drwUpgradePanel(){
  if(!showUpgrades)return;
  const pw2=440,ph=Math.min(H-40,STAT_DEFS.length*44+90),px2=W/2-pw2/2,py2=H/2-ph/2;
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(5,8,22,.97)';rr(px2,py2,pw2,ph,14);ctx.fill();
  ctx.strokeStyle='rgba(0,220,180,.5)';ctx.lineWidth=2;rr(px2,py2,pw2,ph,14);ctx.stroke();
  ctx.font='bold 14px Exo 2';ctx.textAlign='center';ctx.fillStyle='#00e8ca';ctx.fillText('Upgrade Stats  [U]',W/2,py2+22);
  ctx.font='9px Exo 2';ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText('Points: '+P.pts+'   Click +/− to spend   [U] or Esc to close',W/2,py2+38);
  let yy=py2+55;
  for(const s of STAT_DEFS){
    const n=P.stats[s.id]||0;
    const pct=n>0?'+'+Math.round(n*10)+'%':'';

    ctx.font='bold 10px Exo 2';ctx.textAlign='left';ctx.fillStyle='#fff';ctx.fillText(s.lb,px2+18,yy+13);
    ctx.font='7px Exo 2';ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText(s.desc,px2+18,yy+26);
    // Value bar
    const bx=px2+192,bwid=60,bh2=8;

    if(n>0){ctx.fillStyle='#00ffcc';rr(bx,yy+14,Math.max(2,bwid*(n/s.max)),bh2,3);ctx.fill();}
    ctx.font='bold 8px Exo 2';ctx.textAlign='center';ctx.fillStyle=n>=s.max?'#ffcc00':n>0?'#00ffcc':'rgba(255,255,255,.3)';ctx.fillText(pct||'0',bx+bwid/2,yy+18);
    // Minus button
    const mhov=mx>=px2+260&&mx<px2+288&&my>=yy+8&&my<yy+32;
    ctx.fillStyle=mhov&&n>0?'rgba(255,80,80,.7)':'rgba(60,0,0,.6)';rr(px2+260,yy+8,28,24,5);ctx.fill();
    ctx.font='bold 13px Exo 2';ctx.textAlign='center';ctx.fillStyle=n>0?'#ff8888':'rgba(255,255,255,.2)';ctx.fillText('−',px2+274,yy+22);
    // Plus button
    const phov=mx>=px2+295&&mx<px2+323&&my>=yy+8&&my<yy+32;
    ctx.fillStyle=phov&&P.pts>0&&n<s.max?'rgba(0,200,140,.7)':'rgba(0,50,35,.6)';rr(px2+295,yy+8,28,24,5);ctx.fill();
    ctx.fillStyle=P.pts>0&&n<s.max?'#44ffcc':'rgba(255,255,255,.2)';ctx.fillText('+',px2+309,yy+22);
    // Progress bar on right
    const pbx=px2+330,pbw=pw2-340,pbh=8,pby=yy+16;
    ctx.fillStyle='rgba(0,0,0,.4)';rr(pbx,pby,pbw,pbh,3);ctx.fill();
    if(n>0){const g2=safeLinear(pbx,0,pbx+pbw,0);if(g2){g2.addColorStop(0,'#00ccaa');g2.addColorStop(1,'#00ffcc');ctx.fillStyle=g2;}else ctx.fillStyle='#00ffcc';rr(pbx,pby,Math.max(2,pbw*(n/s.max)),pbh,3);ctx.fill();}
    ctx.font='bold 7px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(n+'/'+s.max,pbx+pbw/2,pby+pbh+9);
    yy+=44;
  }
  ctx.font='8px Exo 2';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillText('Press U or Escape to close',W/2,py2+ph-10);
}

// ── DRAW DEATH ───────────────────────────────────────────────
function drwDeath(){
  if(!isDead)return;
  const f=cl(1-deathTimer/2.5,0,1);
  ctx.fillStyle=`rgba(0,0,0,${f*.7})`;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=f;
  ctx.font='bold 48px Exo 2';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=6;ctx.strokeText('YOU DIED',W/2,H/2-40);
  ctx.fillStyle='#ff4444';ctx.fillText('YOU DIED',W/2,H/2-40);
  ctx.font='14px Exo 2';ctx.fillStyle='rgba(255,255,255,.75)';
  ctx.fillText('Best: '+fsc(bestScore)+'  ·  Wave '+waveState.wave+'  ·  Kills: '+P.kills,W/2,H/2+10);
  if(deathTimer<=0){
    const pulse=.6+.4*Math.sin(Date.now()*.006);
    ctx.globalAlpha*=pulse;ctx.font='bold 13px Exo 2';ctx.fillStyle='#fff';
    ctx.fillText('Click anywhere or press R to restart',W/2,H/2+55);
  }
  ctx.restore();
}

// ── MAIN LOOP ────────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;

  if(isDead){
    deathTimer-=dt;updParts();cam.update(P.x,P.y);
  } else if(!showCards&&!showClassPicker&&!showUpgrades&&!showEvolution){
    P.update();updBullets();updEnemies();collide();updParts();updWave(dt);updPickups(dt);
  }

  drwWorld();drwWalls();drwPickups();
  drwBullets();drwEnemies();drwParts();
  if(!isDead)P.draw();
  drwHUD();drwAnnouncements();
  drwCards();drwClassPicker();drwEvolutionPicker();drwUpgradePanel();drwDeath();

  if(screenFlash>0){
    ctx.save();ctx.globalAlpha=screenFlash;ctx.fillStyle=screenFlashCol;ctx.fillRect(0,0,W,H);ctx.restore();
    screenFlash=Math.max(0,screenFlash-.05);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});
