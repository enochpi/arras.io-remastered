b.atkT++;if(b.atkT>=b.rt){b.atkT=0;if(b.pt==="spread"){for(let i=-3;i<=3;i++)fire1(b.x,b.y,pa+i*0.22,b.dm,7,1,0,b.id,b,b.col,8)}else if(b.pt==="heavy"){fire1(b.x,b.y,pa,b.dm*2,5,3,0,b.id,b,b.col,14)}else if(b.pt==="summon"){if(shapes.length<C.MS+10)for(let i=0;i<2;i++){const sa=rn(0,6.28);shapes.push(mkS(b.x+Math.cos(sa)*80,b.y+Math.sin(sa)*80,"triangle",null))}fire1(b.x,b.y,pa,b.dm,7,1,0,b.id,b,b.col)}else if(b.pt==="spiral"){b.spA+=0.2;for(let i=0;i<3;i++)fire1(b.x,b.y,b.spA+i*2.094,b.dm,6,1,0,b.id,b,b.col,6)}else if(b.pt==="ring"){b.rgA+=0.08;for(let i=0;i<8;i++)fire1(b.x,b.y,b.rgA+i*0.785,b.dm*0.6,4.5,1,0,b.id,b,b.col,5)}else if(b.pt==="barrage"){for(let i=-2;i<=2;i++)fire1(b.x,b.y,pa+i*0.15,b.dm*1.2,8,2,0,b.id,b,b.col,9);b.spA+=0.25;for(let i=0;i<4;i++)fire1(b.x,b.y,b.spA+i*1.571,b.dm*0.6,5,1,0,b.id,b,b.col,6)}else if(b.pt==="vortex"){b.rgA+=0.06;for(let i=0;i<5;i++)fire1(b.x,b.y,b.rgA+i*1.257,b.dm*0.7,4,1,0,b.id,b,b.col,6)}}if(b.ft>0)b.ft--;if(b.hp<b.mhp)b.hp+=0.08}}
function drwBoss(){const z=cam.z;for(const b of bosses){if(!cam.vis(b.x,b.y,b.r+40))continue;const sx=cam.SX(b.x),sy=cam.SY(b.y),sr=Math.max(8,b.r*z);ctx.save();ctx.translate(sx,sy);ctx.rotate(b.angle);ctx.fillStyle="#777";rr(ctx,0,-sr*0.18,sr*1.2,sr*0.36,2);ctx.fill();ctx.restore();dC(ctx,sx,sy,sr,b.ft>0?"#fff":b.col,b.ol,Math.max(1,2.5*z));dBar(ctx,sx,sy+sr+5*z,sr*2,Math.max(3,4*z),b.hp/b.mhp,"#ff5555");ctx.save();ctx.font=`bold ${Math.max(8,Math.round(9*z))}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=2;ctx.strokeText(b.lb,sx,sy-sr-4*z);ctx.fillStyle=b.col;ctx.fillText(b.lb,sx,sy-sr-4*z);ctx.restore()}}
let curEvt=null,evtT=0,nextEvt=ri(C.EMIN,C.EMAX),evtN="",evtNT=0;

function onSD(s,oid,cr){const pts=s.gS(),xp=s.xp*(cr?2:1);if(oid==="player"){tank.score+=pts;tank.addXP(xp);tank.recalc();sFl=6;addPop(s.x,s.y,pts,s.vr?C.RARES[s.vr].c:"#fff",cr)}emP(s.x,s.y,s.c,C.SDP,2.5,3,16);sBreak()}

function update(){

updShapes(tick,isMig);for(let i=shapes.length-1;i>=0;i--)if(!shapes[i].al)shapes.splice(i,1);
const def=C.MS-shapes.length,rate=isStm?C.SSR*3:C.SSR;for(let i=0;i<Math.min(def,rate);i++)spawnS(tank.x,tank.y,isRr);
for(const m of megaS){m.rot+=m.rv;m.vx*=0.96;m.vy*=0.96;m.x+=m.vx;m.y+=m.vy;if(m.ft>0)m.ft--}for(let i=megaS.length-1;i>=0;i--)if(!megaS[i].al)megaS.splice(i,1);
megaT--;if(megaT<=0){megaT=ri(350,600);spawnMega()}
updAI(tick);for(let i=ais.length-1;i>=0;i--){if(!ais[i].al){ais.splice(i,1);aiRT.push(C.AIRT)}}for(let i=aiRT.length-1;i>=0;i--){aiRT[i]--;if(aiRT[i]<=0){aiRT.splice(i,1);spawnAI()}}
bossT--;if(bossT<=0){bossT=C.BINT;spawnBoss()}updBoss();for(let i=bosses.length-1;i>=0;i--)if(!bosses[i].al)bosses.splice(i,1);
updPart();collide();cam.update(tank.x,tank.y,tank.fov);
const d=tank.score-dSc;dSc+=Math.abs(d)<1?d:d*0.1;if(sFl>0)sFl--;
for(let i=pops.length-1;i>=0;i--){pops[i].y-=1.2;pops[i].x+=pops[i].vx;pops[i].li--;if(pops[i].li<=0)pops.splice(i,1)}
for(let i=0;i<SKK.length&&i<C.STATS.length;i++){if(keys[SKK[i]]){tank.upgrade(C.STATS[i]);keys[SKK[i]]=false}}}
function collide(){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];let rm=false;
for(let j=shapes.length-1;j>=0;j--){const s=shapes[j];if(!s.al)continue;if(dst(b.x,b.y,s.x,s.y)<b.r+s.r){s.hit(b.dm);s.kb(ag(b.x,b.y,s.x,s.y),C.SKB);b.pn--;sHit();if(!s.al)onSD(s,b.oid,b.cr);if(b.pn<=0){bullets.splice(i,1);rm=true;break}}}if(rm)continue;
for(const m of megaS){if(!m.al)continue;if(dst(b.x,b.y,m.x,m.y)<b.r+m.r){m.hit(b.dm);m.kb(ag(b.x,b.y,m.x,m.y),C.SKB*0.08);b.pn--;if(!m.al)onMD(m,b.oid,b.cr);if(b.pn<=0){const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1);rm=true;break}}}if(rm)continue;
if(b.oid==="player"){for(const ai of ais){if(!ai.al)continue;if(dst(b.x,b.y,ai.x,ai.y)<b.r+ai.r){ai.hit(b.dm);b.pn--;if(!ai.al)onAD(ai);if(b.pn<=0){const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1);rm=true}break}}if(rm)continue;
for(const bs of bosses){if(!bs.al)continue;if(dst(b.x,b.y,bs.x,bs.y)<b.r+bs.r){bs.hit(b.dm);b.pn--;if(!bs.al)onBD(bs);if(b.pn<=0){const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1);rm=true}break}}}if(rm)continue;
if(b.oid!=="player"&&dst(b.x,b.y,tank.x,tank.y)<b.r+tank.r){tank.takeDmg(b.dm);const idx=bullets.indexOf(b);if(idx>=0)bullets.splice(idx,1);emP(b.x,b.y,"#f44",2,2.5,2,6)}}}
function render(){ctx.fillStyle=C.BG;ctx.fillRect(0,0,W,H);const z=cam.z;
for(const k in C.BIOMES){const b=C.BIOMES[k];if(cam.vis(b.x+b.w/2,b.y+b.h/2,Math.max(b.w,b.h)/2)){ctx.fillStyle=b.tint;ctx.fillRect(cam.SX(b.x),cam.SY(b.y),Math.round(b.w*z),Math.round(b.h*z))}}
if(z>0.25){ctx.strokeStyle="rgba(0,0,0,0.035)";ctx.lineWidth=1;ctx.beginPath();const gs=C.GS;for(let x=Math.floor(cam.x/gs)*gs;x<cam.x+W/z+gs;x+=gs){const sx=cam.SX(x);ctx.moveTo(sx,0);ctx.lineTo(sx,H)}for(let y=Math.floor(cam.y/gs)*gs;y<cam.y+H/z+gs;y+=gs){const sy=cam.SY(y);ctx.moveTo(0,sy);ctx.lineTo(W,sy)}ctx.stroke()}
ctx.strokeStyle="rgba(200,60,60,0.25)";ctx.lineWidth=2;ctx.strokeRect(cam.SX(0),cam.SY(0),Math.round(C.MW*z),Math.round(C.MH*z));

drwAI();drwBoss();drwB();if(!isDead)tank.draw();drwPart();
for(const p of pops){const a=cl(p.li/p.ml,0,1);if(a<=0)continue;ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${p.big?14:11}px 'Exo 2',sans-serif`;ctx.textAlign="center";ctx.strokeStyle="rgba(0,0,0,0.4)";ctx.lineWidth=2.5;ctx.strokeText(p.tx,cam.SX(p.x),cam.SY(p.y));ctx.fillStyle=p.col;ctx.fillText(p.tx,cam.SX(p.x),cam.SY(p.y));ctx.restore()}
drawHUD();drawMM();if(tank.pendingTier)drawCP()}
function drawHUD(){const cx=W/2;ctx.save();ctx.fillStyle="rgba(20,20,30,0.45)";rr(ctx,cx-100,5,200,35,8);ctx.fill();ctx.font="600 7px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="rgba(255,255,255,0.35)";ctx.fillText("SCORE",cx,14);ctx.font=`bold 16px 'Exo 2',sans-serif`;ctx.fillStyle=sFl>0?"#fe6":"#fff";ctx.fillText(fsc(Math.floor(dSc)),cx,30);ctx.restore();
const bw=220,bh=4,bx=cx-bw/2,by=44;ctx.fillStyle="rgba(0,0,0,0.25)";rr(ctx,bx,by,bw,bh,2);ctx.fill();const xr=cl(tank.xp/tank.xpN,0,1);if(xr>0){ctx.fillStyle="#fa0";rr(ctx,bx,by,Math.max(1,bw*xr),bh,2);ctx.fill()}ctx.save();ctx.font="bold 7px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#fc4";ctx.fillText("Lv"+tank.lv+" "+tank.cls.lb,bx,by+bh+7);if(tank.pts>0){ctx.textAlign="right";ctx.fillStyle="#6f6";ctx.fillText(tank.pts+"pts",bx+bw,by+bh+7)}ctx.restore();
const hw=180,hh=6,hxx=cx-hw/2,hy=H-25;ctx.fillStyle="rgba(0,0,0,0.25)";rr(ctx,hxx,hy,hw,hh,3);ctx.fill();const hr=cl(tank.hp/tank.mhp,0,1);if(hr>0){ctx.fillStyle=hr>0.5?"#4e4":hr>0.25?"#ee4":"#e44";rr(ctx,hxx,hy,Math.max(1,hw*hr),hh,3);ctx.fill()}ctx.save();ctx.font="bold 6px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="rgba(255,255,255,0.45)";ctx.fillText(Math.ceil(tank.hp)+"/"+Math.floor(tank.mhp),cx,hy+hh/2);ctx.restore();
if(tank.pts>0&&!tank.pendingTier){const px=6,py=H/2-C.STATS.length*13;ctx.save();ctx.fillStyle="rgba(20,20,30,0.5)";rr(ctx,px-2,py-10,155,C.STATS.length*13+14,5);ctx.fill();ctx.font="bold 7px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#fc4";ctx.fillText("UPGRADES [1-0]",px,py-2);for(let i=0;i<C.STATS.length;i++){const st=C.STATS[i],y=py+i*13,lv=tank.stats[st],se=C.SE[st];ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="400 6.5px 'Exo 2',sans-serif";ctx.fillText((i<9?""+(i+1):"0")+" "+se.n,px,y);ctx.fillStyle="rgba(0,0,0,0.2)";rr(ctx,px+76,y-2.5,42,4.5,2);ctx.fill();if(lv>0){ctx.fillStyle=se.c;rr(ctx,px+76,y-2.5,42*(lv/C.MST),4.5,2);ctx.fill()}ctx.fillStyle="rgba(255,255,255,0.25)";ctx.font="bold 6px 'Exo 2',sans-serif";ctx.textAlign="right";ctx.fillText(lv+"/"+C.MST,px+143,y);ctx.textAlign="left"}ctx.restore()}

function drawCP(){const tier=tank.pendingTier,opts=C.CT[tier];if(!opts)return;const pw2=280,ph=opts.length*30+48,px=W/2-pw2/2,py=H/2-ph/2;ctx.save();ctx.fillStyle="rgba(5,5,20,0.9)";rr(ctx,px,py,pw2,ph,12);ctx.fill();ctx.strokeStyle="rgba(255,200,50,0.35)";ctx.lineWidth=1.5;rr(ctx,px,py,pw2,ph,12);ctx.stroke();ctx.font="bold 12px 'Exo 2',sans-serif";ctx.textAlign="center";ctx.fillStyle="#fc4";ctx.fillText("LEVEL "+tier+"! Choose:",W/2,py+18);let yy=py+34;for(const k of opts){const tc=C.CL[k];if(!tc)continue;ctx.fillStyle="rgba(255,255,255,0.06)";rr(ctx,px+6,yy-6,pw2-12,24,5);ctx.fill();ctx.font="bold 10px 'Exo 2',sans-serif";ctx.textAlign="left";ctx.fillStyle="#3df";ctx.fillText(tc.lb,px+12,yy+5);ctx.font="400 8px 'Exo 2',sans-serif";ctx.textAlign="right";ctx.fillStyle="#999";ctx.fillText(tc.ds,px+pw2-12,yy+5);yy+=30}ctx.restore()}

function loop(){update();render();requestAnimationFrame(loop)}
cam.x=tank.x-W/2;cam.y=tank.y-H/2;

    if(e.key.toLowerCase() === "q"){  // Q key pressed
